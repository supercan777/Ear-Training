<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom Trainer</title>
    <style>
        body { margin: 0; height: 100vh; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; background: #1a1a1a; overflow: hidden; }
        
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#1a1a1a; z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #pw-input { padding: 15px; font-size: 1.2em; border-radius: 8px; border: none; margin-bottom: 10px; width: 250px; text-align: center; }
        
        #settings-trigger { position: fixed; top: 20px; right: 20px; font-size: 2em; cursor: pointer; z-index: 200; }
        #settings-menu { position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: #1a1a1a; border-left: 1px solid #333; z-index: 150; transition: 0.4s; padding: 40px 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #settings-menu.open { right: 0; }
        
        .settings-group { width: 100%; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; }
        .settings-label { margin-bottom: 10px; font-size: 0.8em; color: #7f8c8d; }
        
        .btn-row { display: flex; align-items: center; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .separator { color: #555; margin: 0 5px; font-weight: 200; }
        .settings-btn { padding: 8px 12px; font-size: 0.85em; cursor: pointer; border-radius: 4px; border: none; background: #333; color: white; transition: 0.2s; min-width: 60px; }
        .settings-btn.active { background: #3498db !important; }
        
        #close-btn, #return-btn { background: none; border: none; color: white; cursor: pointer; border-bottom: 1px solid white; padding: 2px 0; margin-top: 20px; }
        
        .overlay-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#1a1a1a; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        
        #main-ui { display: flex; flex-direction: column; align-items: center; }
        #display-area { position: relative; width: 600px; height: 300px; margin: 20px auto; background: #000; border: 4px solid #3498db; border-radius: 40px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 0 20px rgba(52, 152, 219, 0.3); }
        #rta-canvas { width: 100%; height: 100%; }
        
        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .action-btns button { padding: 12px 20px; cursor: pointer; border-radius: 8px; border: none; background: #444; color: white; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h2>AUTHENTICATION</h2>
        <input type="password" id="pw-input" placeholder="Password">
        <button onclick="checkPassword()" style="padding: 10px 30px;">ENTER</button>
    </div>

    <div id="settings-trigger" onclick="toggleSettings()">⚙️</div>
    
    <div id="settings-menu">
        <div class="settings-group">
            <div class="settings-label">SOURCE</div>
            <div class="btn-row">
                <button class="settings-btn active" onclick="setSource('pn', this)">PN</button>
                <span class="separator">|</span>
                <button class="settings-btn" onclick="document.getElementById('file-input').click()">FILE</button>
                <input type="file" id="file-input" style="display:none;" accept="audio/*" onchange="handleFileUpload(event)">
            </div>
            <div id="file-name" style="font-size:0.7em; color:#3498db; margin-top:8px;">Pink Noise</div>
        </div>
        <div class="settings-group">
            <div class="settings-label">FREQ RANGE</div>
            <div class="btn-row">
                <button class="settings-btn range-btn active" onclick="setRange('all', this)">ALL</button><span class="separator">|</span>
                <button class="settings-btn range-btn" onclick="setRange('low', this)">LOW</button><span class="separator">|</span>
                <button class="settings-btn range-btn" onclick="setRange('mid', this)">MID</button><span class="separator">|</span>
                <button class="settings-btn range-btn" onclick="setRange('high', this)">HIGH</button>
            </div>
        </div>
        <button id="close-btn" onclick="toggleSettings()">CLOSE</button>
    </div>

    <div id="overlay" class="overlay-screen" style="display:none;">
        <h1>Classroom Trainer</h1>
        <div class="btn-row">
            <button class="settings-btn" onclick="init('listen')" style="padding:15px 25px;">LISTEN</button>
            <span class="separator">|</span>
            <button class="settings-btn" onclick="init('practice')" style="padding:15px 25px;">PRACTICE</button>
            <span class="separator">|</span>
            <button class="settings-btn" onclick="init('test')" style="padding:15px 25px;">TEST</button>
        </div>
    </div>

    <div id="main-ui" style="display:none;">
        <h1 id="ui-title">Training</h1>
        
        <div id="display-area">
            <canvas id="rta-canvas"></canvas>
            <div id="answer-display" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); color:#ffeb3b; font-size:3em; font-weight:bold; flex-direction:column; align-items:center; justify-content:center; z-index:10;"></div>
        </div>
        
        <div id="freq-controls" class="btn-row" style="margin: 20px 0; display:none;"></div>
        <div id="status" style="font-size: 1.2em; font-weight:bold;">Ready</div>
        <div id="action-btns" class="action-btns"></div>
        <button id="return-btn" onclick="goBack()">RETURN TO START</button>
    </div>

    <script>
        // --- 오디오 관련 전역 변수 ---
        let audioCtx;
        let masterGain;
        let activeSource = null;
        let biquadFilter = null;
        let customBuffer = null;
        
        let currentRange = 'all'; 
        let currentPracticeFreq = null;
        let sequenceTimer = null;
        const bands = [31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];

        // --- LISTEN 모드 상태 관리 ---
        let currentListenFreq = null; // 현재 켜진 주파수 기억
        let isPlaying = false; // 현재 재생 중인지 체크

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.3; 
                masterGain.connect(audioCtx.destination);
            }
        }

        function checkPassword() { 
            if(document.getElementById('pw-input').value === "1234") { 
                document.getElementById('auth-overlay').style.display='none'; 
                document.getElementById('overlay').style.display='flex'; 
                initAudio();
            } 
        }
        function toggleSettings() { document.getElementById('settings-menu').classList.toggle('open'); }
        function goBack() { 
            stopAudio();
            document.getElementById('main-ui').style.display='none'; 
            document.getElementById('overlay').style.display='flex'; 
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('file-name').innerText = file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                audioCtx.decodeAudioData(e.target.result, function(buffer) {
                    customBuffer = buffer;
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function setSource(type, btn) {
            if(type === 'pn') {
                customBuffer = null;
                document.getElementById('file-name').innerText = "Pink Noise";
            }
        }

        function setRange(range, btn) {
            currentRange = range;
            document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function init(mode) {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('ui-title').innerText = mode.toUpperCase();
            document.getElementById('answer-display').style.display = 'none'; 
            
            const controls = document.getElementById('freq-controls');
            const actions = document.getElementById('action-btns');
            controls.innerHTML = ''; actions.innerHTML = '';
            
            if(mode === 'listen') {
                controls.style.display = 'flex';
                bands.forEach(f => {
                    // id를 부여하여 껐다 켰다(토글)할 때 식별하기 쉽게 만듦
                    controls.innerHTML += `<button id="btn-freq-${f}" class="settings-btn listen-freq-btn" onclick="toggleListenFreq(${f})">${f}Hz</button>`;
                });
                // PLAY / STOP 버튼을 action-btns 영역에 추가
                actions.innerHTML = '<button onclick="playListenAudio()">PLAY</button><button onclick="stopAudio()">STOP</button>';
                
                // 모드 진입 시 초기화
                currentListenFreq = null; 
                if (biquadFilter) biquadFilter.gain.value = 0;
            } else {
                controls.style.display = 'none';
                actions.innerHTML = '<button onclick="runPractice()">START</button><button onclick="listenAgain()">AGAIN</button><button onclick="stopAudio()">STOP</button><button onclick="showAnswers()">ANSWERS</button>';
            }
        }
        
        function generatePinkNoise() {
            const bufferSize = audioCtx.sampleRate * 2;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                b0 = 0.99886 * b0 + white * 0.0555179;
                b1 = 0.99332 * b1 + white * 0.0750759;
                b2 = 0.96900 * b2 + white * 0.1538520;
                b3 = 0.86650 * b3 + white * 0.3104856;
                b4 = 0.55000 * b4 + white * 0.5329522;
                b5 = -0.7616 * b5 - white * 0.0168980;
                output[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
                b6 = white * 0.115926;
            }
            return noiseBuffer;
        }

        // --- 실시간 필터 생성/업데이트 함수 ---
        function createOrUpdateFilter(freq, gain) {
            if (!biquadFilter) {
                biquadFilter = audioCtx.createBiquadFilter();
                biquadFilter.type = "peaking";
                biquadFilter.Q.value = 1.4;
            }
            biquadFilter.frequency.value = freq;
            biquadFilter.gain.value = gain;
        }

        // --- LISTEN 모드: 주파수 버튼 클릭 시 (음원을 끄지 않고 필터만 실시간 변경) ---
        function toggleListenFreq(freq) {
            // 모든 버튼의 색상(active 클래스) 제거
            const allBtns = document.querySelectorAll('.listen-freq-btn');
            allBtns.forEach(btn => btn.classList.remove('active'));

            if (currentListenFreq === freq) {
                // 이미 켜진 주파수를 한 번 더 눌렀을 때 -> 끄기 (Flat)
                currentListenFreq = null;
                if (biquadFilter) biquadFilter.gain.value = 0; // 필터 이득을 0으로 만들어 원본 소리화
                document.getElementById('status').innerText = isPlaying ? "PLAYING: FLAT (원본)" : "READY";
            } else {
                // 새로운 주파수를 눌렀을 때 -> 켜기 (Boost 적용)
                currentListenFreq = freq;
                document.getElementById(`btn-freq-${freq}`).classList.add('active'); // 선택한 버튼만 파란색 켜기
                
                createOrUpdateFilter(freq, 6); // 실시간으로 해당 대역 6dB 부스트
                
                document.getElementById('status').innerText = isPlaying ? `PLAYING: ${freq}Hz` : `READY (적용대기: ${freq}Hz)`;
            }
        }

        // --- LISTEN 모드: 오디오 재생 (PLAY 버튼) ---
        function playListenAudio() {
            if (isPlaying) return; // 이미 재생 중이면 무시
            
            // 필터가 없으면 1000Hz, Gain 0(Flat) 상태로 기본 생성
            if (!biquadFilter) createOrUpdateFilter(1000, 0); 

            activeSource = audioCtx.createBufferSource();
            activeSource.buffer = customBuffer ? customBuffer : generatePinkNoise();
            activeSource.loop = true;
            
            // Source -> Filter -> Master -> Destination 연결
            activeSource.connect(biquadFilter);
            biquadFilter.connect(masterGain);
            activeSource.start();
            
            isPlaying = true;
            
            if (currentListenFreq) {
                document.getElementById('status').innerText = `PLAYING: ${currentListenFreq}Hz`;
            } else {
                document.getElementById('status').innerText = "PLAYING: FLAT (원본)";
            }
        }

        function runPractice() {
            let availableBands = bands;
            if (currentRange === 'low') {
                availableBands = [31.5, 63, 125, 250, 500];
            } else if (currentRange === 'mid') {
                availableBands = [250, 500, 1000, 2000, 4000];
            } else if (currentRange === 'high') {
                availableBands = [1000, 2000, 4000, 8000, 16000];
            }

            const randomIndex = Math.floor(Math.random() * availableBands.length);
            currentPracticeFreq = availableBands[randomIndex];
            playSequence(currentPracticeFreq);
        }

        function listenAgain() {
            if (currentPracticeFreq) {
                playSequence(currentPracticeFreq);
            } else {
                alert("START 버튼을 먼저 눌러주세요.");
            }
        }

        function showAnswers() {
            if (currentPracticeFreq) {
                const display = document.getElementById('answer-display');
                display.innerText = currentPracticeFreq + " Hz";
                display.style.display = 'flex'; 
            }
        }

        function playSequence(freq) {
            stopAudio();
            document.getElementById('answer-display').style.display = 'none'; 
            
            biquadFilter = audioCtx.createBiquadFilter();
            biquadFilter.type = "peaking";
            biquadFilter.frequency.value = freq;
            biquadFilter.Q.value = 1.4;
            biquadFilter.gain.value = 0; 

            activeSource = audioCtx.createBufferSource();
            activeSource.buffer = customBuffer ? customBuffer : generatePinkNoise();
            activeSource.loop = true;
            activeSource.connect(biquadFilter);
            biquadFilter.connect(masterGain);
            activeSource.start();

            document.getElementById('status').innerText = "PLAYING...";

            function step1() {
                biquadFilter.gain.value = 0; 
                sequenceTimer = setTimeout(step2, 3000);
            }
            function step2() {
                biquadFilter.gain.value = 6; 
                sequenceTimer = setTimeout(step3, 3000);
            }
            function step3() {
                biquadFilter.gain.value = 0; 
                sequenceTimer = setTimeout(step4, 3000);
            }
            function step4() {
                biquadFilter.gain.value = 6; 
                sequenceTimer = setTimeout(endSequence, 3000);
            }
            function endSequence() {
                stopAudio();
            }
            
            step1(); 
        }

        // --- 공통 정지 기능 ---
        function stopAudio() {
            clearTimeout(sequenceTimer);
            if (activeSource) {
                try { activeSource.stop(); activeSource.disconnect(); } catch(e) {}
                activeSource = null;
            }
            isPlaying = false;
            document.getElementById('status').innerText = "STOPPED";
        }

        function drawRTA() {
            const canvas = document.getElementById('rta-canvas'); const ctx = canvas.getContext('2d'); canvas.width = 600; canvas.height = 300;
            ctx.clearRect(0,0,600,300);
            for(let i=0; i<30; i++) { let h = Math.random()*150+20; ctx.fillStyle='#3498db'; ctx.fillRect(i*20, 300-h, 15, h); }
            setTimeout(() => requestAnimationFrame(drawRTA), 100);
        } drawRTA();
    </script>
</body>
</html>
