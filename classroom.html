<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom Trainer</title>
    <style>
        body { margin: 0; height: 100vh; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; background: #1a1a1a; overflow: hidden; }
        
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#1a1a1a; z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #pw-input { padding: 15px; font-size: 1.2em; border-radius: 8px; border: none; margin-bottom: 10px; width: 250px; text-align: center; }
        
        #settings-trigger { position: fixed; top: 20px; right: 20px; font-size: 2em; cursor: pointer; z-index: 200; }
        #settings-menu { position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: #1a1a1a; border-left: 1px solid #333; z-index: 150; transition: 0.4s; padding: 40px 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #settings-menu.open { right: 0; }
        
        .settings-group { width: 100%; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; }
        .settings-label { margin-bottom: 10px; font-size: 0.8em; color: #7f8c8d; }
        
        .btn-row { display: flex; align-items: center; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .separator { color: #555; margin: 0 5px; font-weight: 200; }
        .settings-btn { padding: 8px 12px; font-size: 0.85em; cursor: pointer; border-radius: 4px; border: none; background: #333; color: white; transition: 0.2s; min-width: 60px; }
        .settings-btn.active { background: #3498db !important; }
        
        #close-btn, #return-btn { background: none; border: none; color: white; cursor: pointer; border-bottom: 1px solid white; padding: 2px 0; margin-top: 20px; }
        
        .overlay-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#1a1a1a; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        
        #main-ui { display: flex; flex-direction: column; align-items: center; }
        #display-area { position: relative; width: 600px; height: 300px; margin: 20px auto; background: #000; border: 4px solid #3498db; border-radius: 40px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 0 20px rgba(52, 152, 219, 0.3); }
        #rta-canvas { width: 100%; height: 100%; }
        
        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .action-btns button { padding: 12px 20px; cursor: pointer; border-radius: 8px; border: none; background: #444; color: white; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h2>AUTHENTICATION</h2>
        <input type="password" id="pw-input" placeholder="Password">
        <button onclick="checkPassword()" style="padding: 10px 30px;">ENTER</button>
    </div>

    <div id="settings-trigger" onclick="toggleSettings()">⚙️</div>
    
    <div id="settings-menu">
        <div class="settings-group">
            <div class="settings-label">SOURCE</div>
            <div class="btn-row">
                <button id="btn-src-pn" class="settings-btn active" onclick="setSource('pn')">PN</button>
                <span class="separator">|</span>
                <button id="btn-src-file" class="settings-btn" onclick="document.getElementById('file-input').click()">FILE</button>
                <input type="file" id="file-input" style="display:none;" accept="audio/*" onchange="handleFileUpload(event)">
            </div>
            <div id="file-name" style="font-size:0.7em; color:#3498db; margin-top:8px;">Pink Noise</div>
        </div>
        
        <div class="settings-group" id="file-time-group" style="display:none;">
            <div class="settings-label">FILE START TIME</div>
            <div class="btn-row">
                <button class="settings-btn" onclick="adjustFileTime(-10)">-10s</button>
                <span id="file-time-display" style="margin: 0 10px; font-size: 1em; color: #3498db; width: 40px; text-align: center; font-weight: bold;">0s</span>
                <button class="settings-btn" onclick="adjustFileTime(10)">+10s</button>
            </div>
        </div>

        <div class="settings-group">
            <div class="settings-label">FREQ RANGE</div>
            <div class="btn-row">
                <button class="settings-btn range-btn active" onclick="setRange('all', this)">ALL</button><span class="separator">|</span>
                <button class="settings-btn range-btn" onclick="setRange('low', this)">LOW</button><span class="separator">|</span>
                <button class="settings-btn range-btn" onclick="setRange('mid', this)">MID</button><span class="separator">|</span>
                <button class="settings-btn range-btn" onclick="setRange('high', this)">HIGH</button>
            </div>
        </div>
        <button id="close-btn" onclick="toggleSettings()">CLOSE</button>
    </div>

    <div id="overlay" class="overlay-screen" style="display:none;">
        <h1>Classroom Trainer</h1>
        <div class="btn-row">
            <button class="settings-btn" onclick="init('listen')" style="padding:15px 25px;">LISTEN</button>
            <span class="separator">|</span>
            <button class="settings-btn" onclick="init('practice')" style="padding:15px 25px;">PRACTICE</button>
            <span class="separator">|</span>
            <button class="settings-btn" onclick="init('test')" style="padding:15px 25px;">TEST</button>
        </div>
    </div>

    <div id="main-ui" style="display:none;">
        <h1 id="ui-title">Training</h1>
        
        <div id="display-area">
            <canvas id="rta-canvas"></canvas>
            <div id="answer-display" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); color:#ffeb3b; font-size:2em; font-weight:bold; flex-direction:column; align-items:center; justify-content:center; z-index:10; text-align:center;"></div>
        </div>
        
        <div id="freq-controls" class="btn-row" style="margin: 20px 0; display:none;"></div>
        <div id="status" style="font-size: 1.2em; font-weight:bold;">Ready</div>
        <div id="action-btns" class="action-btns"></div>
        <button id="return-btn" onclick="goBack()">RETURN TO START</button>
    </div>

    <script>
        // --- 오디오 관련 전역 변수 ---
        let audioCtx;
        let masterGain;
        let activeSource = null;
        let biquadFilter = null;
        let customBuffer = null;
        
        // --- 모드 및 상태 변수 ---
        let currentMode = '';
        let currentRange = 'all'; 
        let currentPracticeFreq = null;
        let sequenceTimer = null;
        const bands = [31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];

        // LISTEN 모드
        let currentListenFreq = null; 
        let isPlaying = false; 

        // TEST 모드 (5문제)
        let testAnswers = [];
        let currentTestQuestion = 0;
        let isTestCompleted = false;

        // 파일 시작 위치(초) 및 파형 캔버스
        let fileStartTime = 0;
        let waveformCanvas = document.createElement('canvas');
        waveformCanvas.width = 600;
        waveformCanvas.height = 300;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.3; 
                masterGain.connect(audioCtx.destination);
            }
        }

        function checkPassword() { 
            if(document.getElementById('pw-input').value === "1234") { 
                document.getElementById('auth-overlay').style.display='none'; 
                document.getElementById('overlay').style.display='flex'; 
                initAudio();
            } 
        }
        function toggleSettings() { document.getElementById('settings-menu').classList.toggle('open'); }
        function goBack() { 
            stopAudio();
            document.getElementById('main-ui').style.display='none'; 
            document.getElementById('overlay').style.display='flex'; 
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            setSource('file'); 
            document.getElementById('file-name').innerText = file.name;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                audioCtx.decodeAudioData(e.target.result, function(buffer) {
                    customBuffer = buffer;
                    fileStartTime = 0; 
                    document.getElementById('file-time-display').innerText = fileStartTime + "s";
                    renderWaveform();
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function renderWaveform() {
            const ctx = waveformCanvas.getContext('2d');
            ctx.clearRect(0,0,600,300);
            const data = customBuffer.getChannelData(0);
            const step = Math.ceil(data.length / 600);
            ctx.fillStyle = '#2980b9'; 
            for (let i = 0; i < 600; i++) {
                let min = 1.0, max = -1.0;
                for (let j = 0; j < step; j++) {
                    let datum = data[i * step + j];
                    if (datum < min) min = datum;
                    if (datum > max) max = datum;
                }
                let y = (1 + min) * 150;
                let h = Math.max(1, (max - min) * 150);
                ctx.fillRect(i, y, 1, h);
            }
        }

        function setSource(type) {
            document.getElementById('btn-src-pn').classList.remove('active');
            document.getElementById('btn-src-file').classList.remove('active');
            
            if(type === 'pn') {
                document.getElementById('btn-src-pn').classList.add('active');
                customBuffer = null;
                document.getElementById('file-name').innerText = "Pink Noise";
                document.getElementById('file-time-group').style.display = 'none'; 
            } else {
                document.getElementById('btn-src-file').classList.add('active');
                document.getElementById('file-time-group').style.display = 'flex'; 
            }
        }

        function adjustFileTime(sec) {
            fileStartTime += sec;
            if (fileStartTime < 0) fileStartTime = 0;
            if (customBuffer && fileStartTime >= customBuffer.duration) {
                fileStartTime = Math.floor(customBuffer.duration) - 5;
            }
            document.getElementById('file-time-display').innerText = fileStartTime + "s";
        }

        function setRange(range, btn) {
            currentRange = range;
            document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function init(mode) {
            currentMode = mode;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('ui-title').innerText = mode.toUpperCase();
            document.getElementById('answer-display').style.display = 'none'; 
            
            const controls = document.getElementById('freq-controls');
            const actions = document.getElementById('action-btns');
            controls.innerHTML = ''; actions.innerHTML = '';
            
            if(mode === 'listen') {
                controls.style.display = 'flex';
                bands.forEach(f => {
                    controls.innerHTML += `<button id="btn-freq-${f}" class="settings-btn listen-freq-btn" onclick="toggleListenFreq(${f})">${f}Hz</button>`;
                });
                actions.innerHTML = '<button onclick="playListenAudio()">PLAY</button><button onclick="stopAudio()">STOP</button>';
                
                currentListenFreq = null; 
                if (biquadFilter) biquadFilter.gain.value = 0;
            } else if(mode === 'practice') {
                controls.style.display = 'none';
                actions.innerHTML = '<button onclick="runPractice()">START</button><button onclick="listenAgain()">AGAIN</button><button onclick="stopAudio()">STOP</button><button onclick="showAnswers()">ANSWERS</button>';
            } else if(mode === 'test') {
                controls.style.display = 'none';
                actions.innerHTML = '<button onclick="runTest()">START</button><button onclick="listenAgain()">AGAIN</button><button onclick="stopAudio()">STOP</button><button onclick="showAnswers()">ANSWERS</button>';
            }
        }
        
        // 핑크노이즈 버퍼를 10초로 늘려 매우 안정적으로 연속 출제가 가능하도록 강화
        function generatePinkNoise() {
            const bufferSize = audioCtx.sampleRate * 10; // 10초 무한루프
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                b0 = 0.99886 * b0 + white * 0.0555179;
                b1 = 0.99332 * b1 + white * 0.0750759;
                b2 = 0.96900 * b2 + white * 0.1538520;
                b3 = 0.86650 * b3 + white * 0.3104856;
                b4 = 0.55000 * b4 + white * 0.5329522;
                b5 = -0.7616 * b5 - white * 0.0168980;
                output[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
                b6 = white * 0.115926;
            }
            return noiseBuffer;
        }

        function createOrUpdateFilter(freq, gain) {
            if (!biquadFilter) {
                biquadFilter = audioCtx.createBiquadFilter();
                biquadFilter.type = "peaking";
                biquadFilter.Q.value = 1.4;
            }
            biquadFilter.frequency.value = freq;
            biquadFilter.gain.value = gain;
        }

        function toggleListenFreq(freq) {
            const allBtns = document.querySelectorAll('.listen-freq-btn');
            allBtns.forEach(btn => btn.classList.remove('active'));

            if (currentListenFreq === freq) {
                currentListenFreq = null;
                if (biquadFilter) biquadFilter.gain.value = 0; 
                document.getElementById('status').innerText = isPlaying ? "PLAYING: FLAT (원본)" : "READY";
            } else {
                currentListenFreq = freq;
                document.getElementById(`btn-freq-${freq}`).classList.add('active'); 
                createOrUpdateFilter(freq, 6); 
                document.getElementById('status').innerText = isPlaying ? `PLAYING: ${freq}Hz` : `READY (적용대기: ${freq}Hz)`;
            }
        }

        function playListenAudio() {
            if (isPlaying) return; 
            if (!biquadFilter) createOrUpdateFilter(1000, 0); 

            activeSource = audioCtx.createBufferSource();
            activeSource.buffer = customBuffer ? customBuffer : generatePinkNoise();
            activeSource.loop = true;
            
            activeSource.connect(biquadFilter);
            biquadFilter.connect(masterGain);
            
            let offset = customBuffer ? fileStartTime : 0;
            activeSource.start(0, offset);
            isPlaying = true;
            
            if (currentListenFreq) document.getElementById('status').innerText = `PLAYING: ${currentListenFreq}Hz`;
            else document.getElementById('status').innerText = "PLAYING: FLAT (원본)";
        }

        function getAvailableBands() {
            if (currentRange === 'low') return [31.5, 63, 125, 250, 500];
            if (currentRange === 'mid') return [250, 500, 1000, 2000, 4000];
            if (currentRange === 'high') return [1000, 2000, 4000, 8000, 16000];
            return bands;
        }

        function runPractice() {
            let availableBands = getAvailableBands();
            currentPracticeFreq = availableBands[Math.floor(Math.random() * availableBands.length)];
            playSequence(currentPracticeFreq);
        }

        function runTest() {
            let availableBands = getAvailableBands();
            testAnswers = [];
            for (let i = 0; i < 5; i++) {
                testAnswers.push(availableBands[Math.floor(Math.random() * availableBands.length)]);
            }
            isTestCompleted = false;
            currentTestQuestion = 0;
            startTestSequence(0);
        }

        // --- 스마트 AGAIN 다시듣기 로직 ---
        function listenAgain() {
            if (currentMode === 'practice') {
                if (currentPracticeFreq) playSequence(currentPracticeFreq);
                else alert("START 버튼을 먼저 눌러주세요.");
            } else if (currentMode === 'test') {
                if (testAnswers.length === 5) {
                    if (isTestCompleted) {
                        // 완료 후 AGAIN: 처음(1번)부터 다시
                        currentTestQuestion = 0;
                        startTestSequence(0);
                    } else if (isPlaying || document.getElementById('status').innerText.includes("STOPPED")) {
                        // 도중에 AGAIN: 현재 진행 중이던 그 문제만 처음(원본 5초)부터 다시!
                        startTestSequence(currentTestQuestion);
                    }
                }
                else alert("START 버튼을 먼저 눌러주세요.");
            }
        }

        function showAnswers() {
            const display = document.getElementById('answer-display');
            if (currentMode === 'practice') {
                if (currentPracticeFreq) {
                    display.innerText = currentPracticeFreq + " Hz";
                    display.style.display = 'flex'; 
                }
            } else if (currentMode === 'test') {
                if (testAnswers.length === 5) {
                    display.innerHTML = '<div style="font-size:0.6em; color:#fff; margin-bottom:15px;">[ TEST 정답 ]</div>' + 
                                        testAnswers.map((ans, i) => `${i+1}번: ${ans} Hz`).join('<br>');
                    display.style.display = 'flex'; 
                }
            }
        }

        function playSequence(freq) {
            stopAudio();
            document.getElementById('answer-display').style.display = 'none'; 
            
            biquadFilter = audioCtx.createBiquadFilter();
            biquadFilter.type = "peaking";
            biquadFilter.frequency.value = freq;
            biquadFilter.Q.value = 1.4;
            biquadFilter.gain.value = 0; 

            activeSource = audioCtx.createBufferSource();
            activeSource.buffer = customBuffer ? customBuffer : generatePinkNoise();
            activeSource.loop = true;
            activeSource.connect(biquadFilter);
            biquadFilter.connect(masterGain);
            
            let offset = customBuffer ? fileStartTime : 0;
            activeSource.start(0, offset);
            isPlaying = true;

            document.getElementById('status').innerText = "PLAYING...";

            function step1() { biquadFilter.gain.value = 0; sequenceTimer = setTimeout(step2, 3000); }
            function step2() { biquadFilter.gain.value = 6; sequenceTimer = setTimeout(step3, 3000); }
            function step3() { biquadFilter.gain.value = 0; sequenceTimer = setTimeout(step4, 3000); }
            function step4() { biquadFilter.gain.value = 6; sequenceTimer = setTimeout(stopAudio, 3000); }
            step1(); 
        }

        // 특정 번호(questionIndex)부터 테스트를 재개하는 만능 함수
        function startTestSequence(questionIndex) {
            stopAudio();
            document.getElementById('answer-display').style.display = 'none'; 
            isTestCompleted = false;
            currentTestQuestion = questionIndex;
            
            biquadFilter = audioCtx.createBiquadFilter();
            biquadFilter.type = "peaking";
            biquadFilter.Q.value = 1.4;
            biquadFilter.gain.value = 0; 

            activeSource = audioCtx.createBufferSource();
            activeSource.buffer = customBuffer ? customBuffer : generatePinkNoise();
            activeSource.loop = true;
            activeSource.connect(biquadFilter);
            biquadFilter.connect(masterGain);
            
            let offset = customBuffer ? fileStartTime : 0;
            activeSource.start(0, offset);
            isPlaying = true;

            nextTestStep();
        }

        function nextTestStep() {
            if (currentTestQuestion >= 5) {
                stopAudio();
                isTestCompleted = true;
                document.getElementById('status').innerText = "TEST COMPLETED! 정답을 확인하거나 AGAIN으로 다시 들으세요.";
                return;
            }

            biquadFilter.gain.value = 0; 
            document.getElementById('status').innerText = `[문제 ${currentTestQuestion + 1}/5] 준비 중... (원본 5초)`;
            
            sequenceTimer = setTimeout(() => {
                biquadFilter.frequency.value = testAnswers[currentTestQuestion];
                biquadFilter.gain.value = 6;
                document.getElementById('status').innerText = `[문제 ${currentTestQuestion + 1}/5] 출제 중! (변화 적용)`;

                sequenceTimer = setTimeout(() => {
                    currentTestQuestion++;
                    nextTestStep(); 
                }, 4000); 
                
            }, 5000); 
        }

        function stopAudio() {
            clearTimeout(sequenceTimer);
            if (activeSource) {
                try { activeSource.stop(); activeSource.disconnect(); } catch(e) {}
                activeSource = null;
            }
            isPlaying = false;
            document.getElementById('status').innerText = "STOPPED";
        }

        function drawRTA() {
            const canvas = document.getElementById('rta-canvas'); 
            const ctx = canvas.getContext('2d'); 
            canvas.width = 600; canvas.height = 300;
            ctx.clearRect(0,0,600,300);

            if (customBuffer) {
                ctx.drawImage(waveformCanvas, 0, 0);
                const startX = (fileStartTime / customBuffer.duration) * 600;
                ctx.fillStyle = '#ffeb3b';
                ctx.fillRect(startX, 0, 2, 300);
            } else {
                for(let i=0; i<30; i++) { 
                    let h = Math.random()*150+20; 
                    ctx.fillStyle='#3498db'; 
                    ctx.fillRect(i*20, 300-h, 15, h); 
                }
            }
            setTimeout(() => requestAnimationFrame(drawRTA), 100);
        } 
        drawRTA();
    </script>
</body>
</html>
