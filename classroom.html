<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Classroom Trainer</title>
    <style>
        body { margin: 0; height: 100vh; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; background: #1a1a1a; overflow: hidden; }
        
        /* 인증 및 기본 레이아웃 */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #pw-input { padding: 15px; font-size: 1.2em; border-radius: 8px; border: none; margin-bottom: 10px; width: 250px; text-align: center; }
        
        /* 설정 메뉴 */
        #settings-trigger { position: fixed; top: 20px; right: 20px; font-size: 2em; cursor: pointer; z-index: 200; }
        #settings-menu { position: fixed; top: 0; right: -350px; width: 350px; height: 100%; background: #1a1a1a; border-left: 1px solid #333; z-index: 150; transition: 0.4s; padding: 40px 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; }
        #settings-menu.open { right: 0; }
        
        .settings-group { width: 100%; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        .settings-label { margin-bottom: 15px; font-size: 0.9em; color: #7f8c8d; }
        .btn-row { display: flex; align-items: center; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .settings-btn { padding: 8px 12px; font-size: 0.85em; cursor: pointer; border-radius: 4px; border: none; background: #333; color: white; margin: 2px; }
        .settings-btn.active { background: #3498db !important; }

        /* 메인 화면 */
        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #main-ui { display: flex; flex-direction: column; align-items: center; }
        #display-area { width: 600px; height: 300px; background: #000; border: 4px solid #3498db; border-radius: 40px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h2>AUTHENTICATION</h2>
        <input type="password" id="pw-input" placeholder="Password">
        <button onclick="checkPassword()" style="padding: 10px 30px;">ENTER</button>
    </div>

    <div id="settings-trigger" onclick="toggleSettings()">⚙️</div>
    <div id="settings-menu">
        <div class="settings-group">
            <div class="settings-label">SOURCE</div>
            <button class="settings-btn active">PINK NOISE</button>
        </div>
        <div class="settings-group">
            <div class="settings-label">MODE</div>
            <button class="settings-btn active">BOOST / CUT / MIXED</button>
        </div>
        <button onclick="toggleSettings()">CLOSE</button>
    </div>

    <div id="overlay" class="overlay-screen" style="display:none;">
        <h1>Classroom Trainer</h1>
        <div class="btn-row">
            <button class="settings-btn" onclick="startMode('LISTEN')">LISTEN</button>
            <button class="settings-btn" onclick="startMode('PRACTICE')">PRACTICE</button>
            <button class="settings-btn" onclick="startMode('TEST')">TEST</button>
        </div>
    </div>

    <div id="main-ui" style="display:none;">
        <h1 id="ui-title">Training</h1>
        <div id="display-area"><canvas id="rta-canvas"></canvas></div>
        <div id="controls"></div>
        <button onclick="location.reload()" style="margin-top:20px;">RETURN</button>
    </div>

    <script>
        function checkPassword() { if(document.getElementById('pw-input').value === "1234") { document.getElementById('auth-overlay').style.display='none'; document.getElementById('overlay').style.display='flex'; } }
        function toggleSettings() { document.getElementById('settings-menu').classList.toggle('open'); }
        
        function startMode(mode) {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('ui-title').innerText = mode;
            // 여기서 모드별 버튼을 새로 생성합니다.
            const controls = document.getElementById('controls');
            controls.innerHTML = (mode === 'LISTEN') ? '<button>주파수 설정 버튼들</button>' : '<button>START</button><button>AGAIN</button><button>ANSWERS</button>';
        }

        // 애니메이션 속도 조절 (100ms)
        function drawRTA() {
            const c = document.getElementById('rta-canvas').getContext('2d');
            // ... (애니메이션 로직)
            setTimeout(() => requestAnimationFrame(drawRTA), 100);
        }
        drawRTA();
    </script>
</body>
</html>
