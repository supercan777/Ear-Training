<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom 5-Question Set Trainer</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f4f4f9; text-align: center; padding: 30px; }
        .mode-group { margin-bottom: 20px; }
        button { padding: 15px 30px; font-size: 1em; cursor: pointer; border-radius: 8px; border: none; margin: 5px; transition: 0.2s; }
        .mode-btn { background: #ddd; }
        .mode-btn.active { background: #3498db; color: white; }
        #status { font-weight: bold; color: #d35400; font-size: 1.8em; margin: 20px; }
        #answer-display { font-size: 1.5em; color: #2c3e50; font-weight: bold; line-height: 1.6; }
    </style>
</head>
<body>
    <h1>Classroom 5-Question Set</h1>
    
    <div class="mode-group">
        <button class="mode-btn active" id="mode1" onclick="setMode(1)">Boost Only</button>
        <button class="mode-btn" id="mode2" onclick="setMode(2)">Cut Only</button>
        <button class="mode-btn" id="mode3" onclick="setMode(3)">Mixed</button>
    </div>

    <div class="controls">
        <button onclick="startFiveQuestionSet()" style="background:#27ae60; color:white;">Start 5-Question Set</button>
        <button onclick="showAllAnswers()" style="background:#2980b9; color:white;">Show All Answers</button>
    </div>

    <div id="status">Ready</div>
    <div id="answer-display"></div>

    <script>
        const ctx = new AudioContext();
        const masterGain = ctx.createGain(); masterGain.gain.value = 0.2; masterGain.connect(ctx.destination);
        const bands = [31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];
        let set = [], timer, filter, source, mode = 1;

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mode'+m).classList.add('active');
        }

        function generateSet() {
            let shuffled = [...bands].sort(() => Math.random() - 0.5);
            set = shuffled.slice(0, 5).map(f => ({
                freq: f,
                gain: (mode === 1) ? 6 : ((mode === 2) ? -6 : (Math.random() > 0.5 ? 6 : -6))
            }));
        }

        function createSource(freq, gain) {
            if(filter) filter.disconnect();
            filter = ctx.createBiquadFilter(); filter.type = "peaking";
            filter.frequency.value = freq; filter.gain.value = gain; filter.Q.value = 1.4;
            
            const b = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
            const data = b.getChannelData(0);
            for(let i=0; i<data.length; i++) data[i] = Math.random()*2-1;
            const s = ctx.createBufferSource(); s.buffer = b; s.loop = true;
            s.connect(filter).connect(masterGain);
            return s;
        }

        function playSet(i) {
            if(i >= 5) { document.getElementById('status').innerText = "Set Complete"; return; }
            source = createSource(set[i].freq, set[i].gain);
            source.start();

            // 패턴: 3(Flat) - 3(Var) - 3(Flat) - 3(Var) - 2(Silence)
            filter.gain.value = 0; document.getElementById('status').innerText = `Q${i+1}: Flat`;
            timer = setTimeout(() => {
                filter.gain.value = set[i].gain; document.getElementById('status').innerText = `Q${i+1}: Change`;
                timer = setTimeout(() => {
                    filter.gain.value = 0; document.getElementById('status').innerText = `Q${i+1}: Flat`;
                    timer = setTimeout(() => {
                        filter.gain.value = set[i].gain; document.getElementById('status').innerText = `Q${i+1}: Change`;
                        timer = setTimeout(() => {
                            source.stop(); source.disconnect();
                            document.getElementById('status').innerText = "Silence";
                            timer = setTimeout(() => playSet(i + 1), 2000);
                        }, 3000);
                    }, 3000);
                }, 3000);
            }, 3000);
        }

        function startFiveQuestionSet() {
            ctx.resume(); clearTimeout(timer);
            generateSet();
            document.getElementById('answer-display').innerText = "";
            playSet(0);
        }

        function showAllAnswers() {
            let html = "Answers:<br>";
            set.forEach((q, i) => html += `Q${i+1}: ${q.freq}Hz (${q.gain > 0 ? "Boost" : "Cut"})<br>`);
            document.getElementById('answer-display').innerHTML = html;
        }
    </script>
</body>
</html>
