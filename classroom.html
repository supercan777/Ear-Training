<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom Trainer</title>
    <style>
        body { margin: 0; height: 100vh; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; background: #1a1a1a; overflow: hidden; }
        
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#1a1a1a; z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #pw-input { padding: 15px; font-size: 1.2em; border-radius: 8px; border: none; margin-bottom: 10px; width: 250px; text-align: center; }
        
        #settings-trigger { position: fixed; top: 20px; right: 20px; font-size: 2em; cursor: pointer; z-index: 200; }
        #settings-menu { position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: #1a1a1a; border-left: 1px solid #333; z-index: 150; transition: 0.4s; padding: 40px 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #settings-menu.open { right: 0; }
        
        .settings-group { width: 100%; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; }
        .settings-label { margin-bottom: 10px; font-size: 0.8em; color: #7f8c8d; }
        
        .btn-row { display: flex; align-items: center; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .separator { color: #555; margin: 0 5px; font-weight: 200; }
        .settings-btn { padding: 8px 12px; font-size: 0.85em; cursor: pointer; border-radius: 4px; border: none; background: #333; color: white; transition: 0.2s; min-width: 60px; }
        .settings-btn.active { background: #3498db !important; }
        
        #close-btn, #return-btn { background: none; border: none; color: white; cursor: pointer; border-bottom: 1px solid white; padding: 2px 0; margin-top: 20px; }
        
        .overlay-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#1a1a1a; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        
        #main-ui { display: flex; flex-direction: column; align-items: center; }
        #display-area { position: relative; width: 600px; height: 300px; margin: 20px auto; background: #000; border: 4px solid #3498db; border-radius: 40px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 0 20px rgba(52, 152, 219, 0.3); }
        #rta-canvas { width: 100%; height: 100%; }
        
        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .action-btns button { padding: 12px 20px; cursor: pointer; border-radius: 8px; border: none; background: #444; color: white; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h2>AUTHENTICATION</h2>
        <input type="password" id="pw-input" placeholder="Password">
        <button onclick="checkPassword()" style="padding: 10px 30px;">ENTER</button>
    </div>

    <div id="settings-trigger" onclick="toggleSettings()">⚙️</div>
    
    <div id="settings-menu">
        <div class="settings-group">
            <div class="settings-label">SOURCE</div>
            <div class="btn-row">
                <button class="settings-btn active" onclick="setSource('pn', this)">PN</button>
                <span class="separator">|</span>
                <button class="settings-btn" onclick="document.getElementById('file-input').click()">FILE</button>
                <!-- 파일 업로드를 위한 숨김 인풋 -->
                <input type="file" id="file-input" style="display:none;" accept="audio/*" onchange="handleFileUpload(event)">
            </div>
            <div id="file-name" style="font-size:0.7em; color:#3498db; margin-top:8px;">Pink Noise</div>
        </div>
        <div class="settings-group">
            <div class="settings-label">FREQ RANGE</div>
            <div class="btn-row">
                <button class="settings-btn active">ALL</button><span class="separator">|</span><button class="settings-btn">LOW</button><span class="separator">|</span><button class="settings-btn">MID</button><span class="separator">|</span><button class="settings-btn">HIGH</button>
            </div>
        </div>
        <button id="close-btn" onclick="toggleSettings()">CLOSE</button>
    </div>

    <div id="overlay" class="overlay-screen" style="display:none;">
        <h1>Classroom Trainer</h1>
        <div class="btn-row">
            <button class="settings-btn" onclick="init('listen')" style="padding:15px 25px;">LISTEN</button>
            <span class="separator">|</span>
            <button class="settings-btn" onclick="init('practice')" style="padding:15px 25px;">PRACTICE</button>
            <span class="separator">|</span>
            <button class="settings-btn" onclick="init('test')" style="padding:15px 25px;">TEST</button>
        </div>
    </div>

    <div id="main-ui" style="display:none;">
        <h1 id="ui-title">Training</h1>
        <div id="display-area"><canvas id="rta-canvas"></canvas></div>
        <div id="freq-controls" class="btn-row" style="margin: 20px 0; display:none;"></div>
        <div id="status" style="font-size: 1.2em; font-weight:bold;">Ready</div>
        <div id="action-btns" class="action-btns"></div>
        <button id="return-btn" onclick="goBack()">RETURN TO START</button>
    </div>

    <script>
        // --- 오디오 관련 전역 변수 ---
        let audioCtx;
        let masterGain;
        let activeSource = null;
        let biquadFilter = null;
        let customBuffer = null;

        // --- 오디오 시스템 초기화 ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.3; // 기본 볼륨
                masterGain.connect(audioCtx.destination);
            }
        }

        // --- 패스워드 및 기본 UI 제어 ---
        function checkPassword() { 
            if(document.getElementById('pw-input').value === "1234") { 
                document.getElementById('auth-overlay').style.display='none'; 
                document.getElementById('overlay').style.display='flex'; 
                initAudio(); // 브라우저 정책상 사용자 인터랙션 시 오디오 활성화
            } 
        }
        function toggleSettings() { document.getElementById('settings-menu').classList.toggle('open'); }
        function goBack() { 
            stopAudio();
            document.getElementById('main-ui').style.display='none'; 
            document.getElementById('overlay').style.display='flex'; 
        }

        // --- 파일 업로드 처리 ---
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('file-name').innerText = file.name;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                audioCtx.decodeAudioData(e.target.result, function(buffer) {
                    customBuffer = buffer;
                });
            };
            reader.readAsArrayBuffer(file);
        }

        function setSource(type, btn) {
            if(type === 'pn') {
                customBuffer = null;
                document.getElementById('file-name').innerText = "Pink Noise";
            }
        }

        // --- 모드별 화면 구성 ---
        function init(mode) {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('ui-title').innerText = mode.toUpperCase();
            
            const controls = document.getElementById('freq-controls');
            const actions = document.getElementById('action-btns');
            controls.innerHTML = ''; actions.innerHTML = '';
            
            if(mode === 'listen') {
                controls.style.display = 'flex';
                // 테스트를 위해 전체 주파수를 나열합니다.
                const bands = [31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];
                bands.forEach(f => {
                    controls.innerHTML += `<button class="settings-btn" onclick="playTone(${f})">${f}Hz</button>`;
                });
            } else {
                controls.style.display = 'none';
                actions.innerHTML = '<button>START</button><button>AGAIN</button><button onclick="stopAudio()">STOP</button><button>ANSWERS</button>';
            }
        }
        
        // --- 오디오 재생 (필터 적용) ---
        function playTone(freq) {
            stopAudio(); // 기존 소리 정지
            
            // 필터 생성
            biquadFilter = audioCtx.createBiquadFilter();
            biquadFilter.type = "peaking";
            biquadFilter.frequency.value = freq;
            biquadFilter.Q.value = 1.4;
            biquadFilter.gain.value = 6; // 6dB Boost

            activeSource = audioCtx.createBufferSource();

            if (customBuffer) {
                // 업로드된 파일 재생
                activeSource.buffer = customBuffer;
            } else {
                // 핑크 노이즈 생성 알고리즘
                const bufferSize = audioCtx.sampleRate * 2; // 2초 버퍼
                const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                
                let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
                for (let i = 0; i < bufferSize; i++) {
                    let white = Math.random() * 2 - 1;
                    b0 = 0.99886 * b0 + white * 0.0555179;
                    b1 = 0.99332 * b1 + white * 0.0750759;
                    b2 = 0.96900 * b2 + white * 0.1538520;
                    b3 = 0.86650 * b3 + white * 0.3104856;
                    b4 = 0.55000 * b4 + white * 0.5329522;
                    b5 = -0.7616 * b5 - white * 0.0168980;
                    output[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
                    b6 = white * 0.115926;
                }
                activeSource.buffer = noiseBuffer;
            }

            activeSource.loop = true;
            activeSource.connect(biquadFilter);
            biquadFilter.connect(masterGain);
            activeSource.start();

            document.getElementById('status').innerText = "PLAYING: " + freq + "Hz";
        }

        // --- 오디오 정지 ---
        function stopAudio() {
            if (activeSource) {
                try { activeSource.stop(); activeSource.disconnect(); } catch(e) {}
                activeSource = null;
            }
            document.getElementById('status').innerText = "STOPPED";
        }

        // --- RTA 애니메이션 (시각적 안정성 100ms 유지) ---
        function drawRTA() {
            const canvas = document.getElementById('rta-canvas'); const ctx = canvas.getContext('2d'); canvas.width = 600; canvas.height = 300;
            ctx.clearRect(0,0,600,300);
            for(let i=0; i<30; i++) { let h = Math.random()*150+20; ctx.fillStyle='#3498db'; ctx.fillRect(i*20, 300-h, 15, h); }
            setTimeout(() => requestAnimationFrame(drawRTA), 100);
        } drawRTA();
    </script>
</body>
</html>
