<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom Training Suite</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f4f4f9; text-align: center; padding: 30px; }
        .mode-group { margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 20px; }
        .btn-row { margin: 10px 0; }
        button { padding: 15px 30px; font-size: 1em; cursor: pointer; border-radius: 8px; border: none; margin: 5px; transition: 0.2s; }
        .mode-btn { background: #ddd; }
        .mode-btn.active { background: #3498db; color: white; }
        #status { font-weight: bold; color: #d35400; font-size: 1.5em; margin: 20px; }
        #answer-display { font-size: 1.3em; color: #2c3e50; font-weight: bold; line-height: 1.6; }
    </style>
</head>
<body>
    <h1>Classroom Training Suite</h1>
    
    <!-- 난이도 선택 -->
    <div class="mode-group">
        <button class="mode-btn active" id="mode1" onclick="setMode(1)">Boost Only</button>
        <button class="mode-btn" id="mode2" onclick="setMode(2)">Cut Only</button>
        <button class="mode-btn" id="mode3" onclick="setMode(3)">Mixed</button>
    </div>

    <!-- 실행 모드 선택 및 컨트롤 -->
    <div class="btn-row">
        <button onclick="startFreeMode()" style="background:#f39c12; color:white;">Free Practice</button>
        <button onclick="startFiveQuestionSet()" style="background:#27ae60; color:white;">5-Question Set</button>
        <button onclick="stopAll()" style="background:#c0392b; color:white;">Stop All</button>
        <button onclick="showAnswers()" style="background:#2980b9; color:white;">Show Answers</button>
    </div>

    <div id="status">Ready</div>
    <div id="answer-display"></div>

    <script>
        const ctx = new AudioContext();
        const masterGain = ctx.createGain(); masterGain.gain.value = 0.2; masterGain.connect(ctx.destination);
        const bands = [31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];
        let set = [], timer, filter, source, mode = 1, isSetMode = false;

        function setMode(m) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mode'+m).classList.add('active');
        }

        function createSource(freq, gain) {
            if(filter) filter.disconnect();
            filter = ctx.createBiquadFilter(); filter.type = "peaking";
            filter.frequency.value = freq; filter.gain.value = gain; filter.Q.value = 1.4;
            const b = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
            const data = b.getChannelData(0);
            for(let i=0; i<data.length; i++) data[i] = Math.random()*2-1;
            const s = ctx.createBufferSource(); s.buffer = b; s.loop = true;
            s.connect(filter).connect(masterGain);
            return s;
        }

        function playPattern(callback) {
            filter.gain.value = 0; document.getElementById('status').innerText = "Flat (3s)";
            timer = setTimeout(() => {
                filter.gain.value = filter.gain.value === 0 ? (Math.random()>0.5 ? 6 : -6) : 0; // 이건 나중에 보정
                // 간단히 패턴 재생
                filter.gain.value = filter.gain.value === 0 ? 6 : 0; // 예시 로직
                document.getElementById('status').innerText = "Change (3s)";
                timer = setTimeout(() => {
                    filter.gain.value = 0; document.getElementById('status').innerText = "Flat (3s)";
                    timer = setTimeout(() => {
                        filter.gain.value = 6; document.getElementById('status').innerText = "Change (3s)";
                        timer = setTimeout(() => { if(callback) callback(); }, 3000);
                    }, 3000);
                }, 3000);
            }, 3000);
        }

        // 5문제 로직
        function playSet(i) {
            if(i >= 5) { document.getElementById('status').innerText = "Set Complete"; return; }
            source = createSource(set[i].freq, set[i].gain); source.start();
            // ... (기존 패턴 재생 로직)
            playPattern(() => { try { source.stop(); } catch(e){} document.getElementById('status').innerText = "Silence"; timer = setTimeout(() => playSet(i + 1), 2000); });
        }

        function startFiveQuestionSet() {
            ctx.resume(); stopAll(); isSetMode = true;
            let shuffled = [...bands].sort(() => Math.random() - 0.5);
            set = shuffled.slice(0, 5).map(f => ({ freq: f, gain: (mode === 1) ? 6 : ((mode === 2) ? -6 : (Math.random() > 0.5 ? 6 : -6)) }));
            document.getElementById('answer-display').innerText = "";
            playSet(0);
        }

        function startFreeMode() {
            ctx.resume(); stopAll(); isSetMode = false;
            let freq = bands[Math.floor(Math.random()*bands.length)];
            let gain = (mode === 1) ? 6 : ((mode === 2) ? -6 : (Math.random() > 0.5 ? 6 : -6));
            source = createSource(freq, gain); source.start();
            set = [{freq, gain}];
            playPattern(() => { source.stop(); document.getElementById('status').innerText = "Finished One Question"; });
        }

        function stopAll() { clearTimeout(timer); try { source.stop(); source.disconnect(); } catch(e){} document.getElementById('status').innerText = "Stopped"; }
        function showAnswers() {
            let html = isSetMode ? "Set Answers:<br>" : "Answer:<br>";
            set.forEach((q, i) => html += (isSetMode ? `Q${i+1}: ` : "") + `${q.freq}Hz (${q.gain > 0 ? "Boost" : "Cut"})<br>`);
            document.getElementById('answer-display').innerHTML = html;
        }
    </script>
</body>
</html>
