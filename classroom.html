<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom Trainer</title>
    <style>
        /* ==============================
           1. 기본 레이아웃 및 폰트
           ============================== */
        body { 
            margin: 0; 
            height: 100vh; 
            font-family: 'Pretendard', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            background: #1a1a1a; 
            overflow: hidden; 
        }
        
        /* ==============================
           2. 인증 화면
           ============================== */
        #auth-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #1a1a1a; z-index: 999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        #pw-input { 
            padding: 15px; font-size: 1.2em; border-radius: 8px; border: none; 
            margin-bottom: 10px; width: 250px; text-align: center; 
        }
        
        /* ==============================
           3. 설정 메뉴 (오른쪽 슬라이드)
           ============================== */
        #settings-trigger { 
            position: fixed; top: 20px; right: 20px; font-size: 2em; cursor: pointer; z-index: 200; 
        }
        #settings-menu { 
            position: fixed; top: 0; right: -400px; width: 350px; height: 100%; 
            background: #1a1a1a; border-left: 1px solid #333; z-index: 150; 
            transition: 0.4s ease-in-out; padding: 40px 20px; 
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        #settings-menu.open { right: 0; }
        
        .settings-group { width: 100%; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; }
        .settings-label { margin-bottom: 10px; font-size: 0.8em; color: #7f8c8d; }
        
        .btn-row { display: flex; align-items: center; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .separator { color: #555; margin: 0 5px; font-weight: 200; }
        
        .settings-btn { 
            padding: 8px 12px; font-size: 0.85em; cursor: pointer; border-radius: 4px; 
            border: none; background: #333; color: white; transition: 0.2s; min-width: 60px; 
        }
        .settings-btn.active { background: #3498db !important; }
        
        #close-btn, #return-btn { 
            background: none; border: none; color: white; cursor: pointer; 
            border-bottom: 1px solid white; padding: 2px 0; margin-top: 20px; 
        }
        
        .upload-label { cursor: pointer; padding: 8px 12px; font-size: 0.85em; border-radius: 4px; background: #333; color: white; }
        #file-input { display: none; }
        
        /* ==============================
           4. 모드 선택 화면 (OVERLAY)
           ============================== */
        .overlay-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #1a1a1a; z-index: 100; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        
        /* ==============================
           5. 메인 UI 및 버튼 디자인
           ============================== */
        #main-ui { display: flex; flex-direction: column; align-items: center; }
        
        #display-area { 
            position: relative; width: 600px; height: 300px; margin: 20px auto; 
            background: #000; border: 4px solid #3498db; border-radius: 40px; 
            display: flex; align-items: center; justify-content: center; overflow: hidden; 
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.3); 
        }
        #rta-canvas { width: 100%; height: 100%; }
        
        #answer-display { 
            position: absolute; width: 85%; height: 85%; display: none; 
            flex-direction: column; align-items: center; justify-content: center; 
            font-size: 2.2em; font-weight: 900; color: #ffeb3b; 
            background: rgba(0,0,0,0.9); border-radius: 30px; z-index: 10; text-align: center; 
        }
        
        .action-btns { display: flex; gap: 10px; margin-top: 20px; }
        .action-btns button { 
            padding: 12px 20px; font-size: 1em; cursor: pointer; border-radius: 8px; 
            border: none; background: #444; color: white; font-weight: bold;
        }
        
        /* LISTEN 모드용 주파수 버튼 명시적 스타일 */
        .freq-btns { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-top: 20px; max-width: 600px; }
        .freq-btns button { 
            padding: 10px 15px; cursor: pointer; border-radius: 4px; border: none; 
            background: #333; color: white; 
        }
    </style>
</head>
<body>

    <!-- [1. 인증 화면] -->
    <div id="auth-overlay">
        <h2>AUTHENTICATION</h2>
        <input type="password" id="pw-input" placeholder="Password">
        <button onclick="checkPassword()" style="padding: 10px 30px; border-radius: 4px; border: none; cursor: pointer;">ENTER</button>
    </div>

    <!-- [2. 설정 메뉴 Trigger] -->
    <div id="settings-trigger" onclick="toggleSettings()">⚙️</div>
    
    <!-- [3. 우측 설정 메뉴 패널] -->
    <div id="settings-menu">
        <div class="settings-group">
            <div class="settings-label">SOURCE</div>
            <div class="btn-row">
                <button id="btn-src-pn" class="settings-btn active" onclick="setSource('pn')">PN</button>
                <span class="separator">|</span>
                <label for="file-input" class="upload-label">UPLOAD</label>
                <input type="file" id="file-input" accept="audio/*" onchange="handleFileUpload(event)">
            </div>
            <div id="file-name" style="font-size:0.7em; color:#3498db; margin-top:8px;">Pink Noise</div>
        </div>
        
        <div class="settings-group">
            <div class="settings-label">FREQUENCY RANGE</div>
            <div class="btn-row">
                <button id="btn-range-all" class="settings-btn active" onclick="setRange('all')">ALL</button>
                <span class="separator">|</span>
                <button id="btn-range-low" class="settings-btn" onclick="setRange('low')">LOW</button>
                <span class="separator">|</span>
                <button id="btn-range-mid" class="settings-btn" onclick="setRange('mid')">MID</button>
                <span class="separator">|</span>
                <button id="btn-range-high" class="settings-btn" onclick="setRange('high')">HIGH</button>
            </div>
        </div>
        
        <div class="settings-group">
            <div class="settings-label">MODE</div>
            <div class="btn-row">
                <button id="btn-mode-1" class="settings-btn active" onclick="setMode(1)">BOOST</button>
                <span class="separator">|</span>
                <button id="btn-mode-2" class="settings-btn" onclick="setMode(2)">CUT</button>
                <span class="separator">|</span>
                <button id="btn-mode-3" class="settings-btn" onclick="setMode(3)">MIXED</button>
            </div>
        </div>
        <button id="close-btn" onclick="toggleSettings()">CLOSE</button>
    </div>

    <!-- [4. 시작 모드 선택 화면] -->
    <div id="overlay" class="overlay-screen" style="display:none;">
        <h1>Classroom Trainer</h1>
        <div class="btn-row">
            <button class="settings-btn" onclick="init('listen')" style="padding:15px 25px;">LISTEN</button>
            <span class="separator">|</span>
            <button class="settings-btn" onclick="init('practice')" style="padding:15px 25px;">PRACTICE</button>
            <span class="separator">|</span>
            <button class="settings-btn" onclick="init('test')" style="padding:15px 25px;">TEST</button>
        </div>
    </div>

    <!-- [5. 메인 훈련 화면] -->
    <div id="main-ui" style="display:none;">
        <h1 id="ui-title">Training</h1>
        
        <!-- 디스플레이 영역 -->
        <div id="display-area">
            <canvas id="rta-canvas"></canvas>
            <div id="answer-display">정답 화면</div>
        </div>
        
        <div id="status" style="font-size: 1.2em; font-weight:bold; margin-top: 10px;">Ready</div>
        
        <!-- LISTEN 모드일 때만 보이는 버튼들 (명시적 나열) -->
        <div id="listen-controls" class="freq-btns" style="display:none;">
            <button onclick="playFreq(31.5)">31.5Hz</button>
            <button onclick="playFreq(63)">63Hz</button>
            <button onclick="playFreq(125)">125Hz</button>
            <button onclick="playFreq(250)">250Hz</button>
            <button onclick="playFreq(500)">500Hz</button>
            <button onclick="playFreq(1000)">1000Hz</button>
            <button onclick="playFreq(2000)">2000Hz</button>
            <button onclick="playFreq(4000)">4000Hz</button>
            <button onclick="playFreq(8000)">8000Hz</button>
            <button onclick="playFreq(16000)">16000Hz</button>
        </div>

        <!-- PRACTICE / TEST 모드일 때만 보이는 버튼들 (명시적 나열) -->
        <div id="practice-controls" class="action-btns" style="display:none;">
            <button onclick="run()">START</button>
            <button onclick="listenAgain()">AGAIN</button>
            <button onclick="stopAll()">STOP</button>
            <button onclick="showAnswers()">ANSWERS</button>
        </div>

        <button id="return-btn" onclick="goBack()">RETURN TO START</button>
    </div>

    <!-- [6. 자바스크립트 로직 (단축 없이 길고 상세하게)] -->
    <script>
        const ctx = new AudioContext();
        const master = ctx.createGain();
        master.gain.value = 0.3;
        master.connect(ctx.destination);
        
        let type = '';
        let customBuffer = null;
        let filter = null;
        let source = null;
        let timer = null;
        let currentMode = 1; // 1: BOOST, 2: CUT, 3: MIXED
        let currentRange = 'all';

        // ==========================================
        // UI 조작 함수
        // ==========================================
        function checkPassword() { 
            const pw = document.getElementById('pw-input').value;
            if(pw === "1234") { 
                document.getElementById('auth-overlay').style.display = 'none'; 
                document.getElementById('overlay').style.display = 'flex'; 
            } else {
                alert("Wrong Password");
            }
        }

        function toggleSettings() { 
            const menu = document.getElementById('settings-menu');
            if (menu.classList.contains('open')) {
                menu.classList.remove('open');
            } else {
                menu.classList.add('open');
            }
        }

        function goBack() { 
            stopAll(); 
            document.getElementById('main-ui').style.display = 'none'; 
            document.getElementById('overlay').style.display = 'flex'; 
        }

        // ==========================================
        // 설정 메뉴 관련 함수
        // ==========================================
        async function handleFileUpload(event) { 
            const file = event.target.files[0]; 
            if(!file) return; 
            const arrayBuffer = await file.arrayBuffer(); 
            customBuffer = await ctx.decodeAudioData(arrayBuffer); 
            document.getElementById('file-name').innerText = file.name; 
            setSource('file');
        }

        function setSource(srcType) { 
            document.getElementById('btn-src-pn').classList.remove('active');
            
            if (srcType === 'pn') {
                customBuffer = null; 
                document.getElementById('file-name').innerText = "Pink Noise"; 
                document.getElementById('btn-src-pn').classList.add('active');
            }
        }

        function setRange(range) { 
            currentRange = range; 
            document.getElementById('btn-range-all').classList.remove('active');
            document.getElementById('btn-range-low').classList.remove('active');
            document.getElementById('btn-range-mid').classList.remove('active');
            document.getElementById('btn-range-high').classList.remove('active');
            document.getElementById('btn-range-' + range).classList.add('active');
        }

        function setMode(modeNum) { 
            currentMode = modeNum; 
            document.getElementById('btn-mode-1').classList.remove('active');
            document.getElementById('btn-mode-2').classList.remove('active');
            document.getElementById('btn-mode-3').classList.remove('active');
            document.getElementById('btn-mode-' + modeNum).classList.add('active');
        }

        // ==========================================
        // 모드 진입 초기화 (각 모드별 UI 전환을 명확히 분리)
        // ==========================================
        function init(modeString) {
            type = modeString; 
            document.getElementById('overlay').style.display = 'none'; 
            document.getElementById('main-ui').style.display = 'flex';
            
            if (type === 'listen') {
                document.getElementById('ui-title').innerText = "LISTEN MODE";
                document.getElementById('listen-controls').style.display = 'flex';
                document.getElementById('practice-controls').style.display = 'none';
            } 
            else if (type === 'practice') {
                document.getElementById('ui-title').innerText = "PRACTICE MODE";
                document.getElementById('listen-controls').style.display = 'none';
                document.getElementById('practice-controls').style.display = 'flex';
            } 
            else if (type === 'test') {
                document.getElementById('ui-title').innerText = "TEST MODE";
                document.getElementById('listen-controls').style.display = 'none';
                document.getElementById('practice-controls').style.display = 'flex';
            }
        }

        // ==========================================
        // 오디오 엔진 및 재생 함수 (단축 없이 전체 작성)
        // ==========================================
        function createPinkNoise() {
            const bufferSize = ctx.sampleRate * 2; 
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const output = buffer.getChannelData(0);
            let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
            
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                b0 = 0.99886 * b0 + white * 0.0555179;
                b1 = 0.99332 * b1 + white * 0.0750759;
                b2 = 0.96900 * b2 + white * 0.1538520;
                b3 = 0.86650 * b3 + white * 0.3104856;
                b4 = 0.55000 * b4 + white * 0.5329522;
                b5 = -0.7616 * b5 - white * 0.0168980;
                output[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                output[i] *= 0.11; // 핑크노이즈 게인 조절
                b6 = white * 0.115926;
            }
            return buffer;
        }

        function createSource(freq, gain) {
            if (filter) { filter.disconnect(); }
            
            filter = ctx.createBiquadFilter(); 
            filter.type = "peaking"; 
            filter.frequency.value = freq; 
            filter.gain.value = gain; 
            filter.Q.value = 1.4;
            
            const src = ctx.createBufferSource();
            if (customBuffer) {
                src.buffer = customBuffer;
            } else {
                src.buffer = createPinkNoise();
            }
            src.loop = true; 
            src.connect(filter);
            filter.connect(master); 
            return src;
        }

        async function playFreq(freq) { 
            stopAll(); 
            source = createSource(freq, 6); // Listen 모드 기본 +6dB 부스트
            source.start(); 
            document.getElementById('status').innerText = "PLAYING: " + freq + "Hz"; 
            timer = setTimeout(stopAll, 3000); 
        }

        function stopAll() { 
            clearTimeout(timer); 
            if (source) {
                try { source.stop(); source.disconnect(); } catch(e) {}
            }
            document.getElementById('status').innerText = "STOPPED"; 
        }

        // ==========================================
        // RTA 애니메이션 (속도 100ms로 차분하게 유지)
        // ==========================================
        function drawRTA() {
            const canvas = document.getElementById('rta-canvas'); 
            const rtaCtx = canvas.getContext('2d'); 
            canvas.width = 600; 
            canvas.height = 300;
            
            rtaCtx.clearRect(0, 0, 600, 300);
            for(let i = 0; i < 30; i++) { 
                let h = Math.random() * 150 + 20; 
                rtaCtx.fillStyle = '#3498db'; 
                rtaCtx.fillRect(i * 20, 300 - h, 15, h); 
            }
            setTimeout(() => requestAnimationFrame(drawRTA), 100);
        } 
        drawRTA();

        // ==========================================
        // PRACTICE 및 TEST 모드용 버튼 함수 (형태 유지)
        // ==========================================
        function run() {
            document.getElementById('status').innerText = "Running Practice/Test...";
        } 
        
        function listenAgain() {
            document.getElementById('status').innerText = "Listening Again...";
        }
        
        function showAnswers() {
            const answerDisplay = document.getElementById('answer-display');
            answerDisplay.style.display = "flex";
            answerDisplay.innerText = "정답 확인";
            setTimeout(() => { answerDisplay.style.display = "none"; }, 2000);
        }
    </script>
</body>
</html>
