<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom Trainer</title>
    <style>
        body { margin: 0; height: 100vh; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; background: #1a1a1a; }
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .mode-btn { padding: 20px 40px; font-size: 1.5em; margin: 10px; cursor: pointer; border-radius: 10px; border: none; background: #3498db; color: white; }
        
        .controls { display: none; text-align: center; width: 100%; }
        
        #display-area { 
            position: relative; width: 600px; height: 300px; margin: 20px auto; 
            background: #000; border: 4px solid #3498db; border-radius: 40px;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
            box-shadow: 0 0 20px rgba(52, 152, 219, 0.3);
        }
        #rta-canvas { width: 100%; height: 100%; }
        #answer-display { 
            position: absolute; font-size: 3.5em; font-weight: 900; color: #ffeb3b; 
            text-shadow: 0 0 15px rgba(0,0,0,0.8); z-index: 10;
        }
        
        .btn-row { margin: 5px; }
        .btn-row button { padding: 10px 18px; font-size: 0.9em; cursor: pointer; border-radius: 6px; border: none; margin: 3px; background: #444; color: white; transition: 0.2s; }
        .btn-row button:hover { background: #666; }
        .nav-btn.active, .range-btn.active { background: #3498db !important; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>Select Mode</h1>
        <button class="mode-btn" onclick="init('free')">Free Practice</button>
        <button class="mode-btn" onclick="init('set')">5-Question Set</button>
    </div>

    <div id="main-ui" class="controls">
        <h1 id="ui-title">Training</h1>
        
        <div class="btn-row">
            <button id="m1" class="nav-btn active" onclick="setMode(1)">BOOST</button>
            <button id="m2" class="nav-btn" onclick="setMode(2)">CUT</button>
            <button id="m3" class="nav-btn" onclick="setMode(3)">MIXED</button>
        </div>
        <div class="btn-row">
            <button class="range-btn active" onclick="setRange('all', this)">ALL</button>
            <button class="range-btn" onclick="setRange('low', this)">LOW (31.5-500)</button>
            <button class="range-btn" onclick="setRange('mid', this)">MID (250-4k)</button>
            <button class="range-btn" onclick="setRange('high', this)">HIGH (1k-16k)</button>
        </div>

        <div id="display-area">
            <canvas id="rta-canvas"></canvas>
            <div id="answer-display"></div>
        </div>

        <div id="status" style="font-size: 1.2em; font-weight:bold; margin-bottom: 10px;">Ready</div>

        <div class="btn-row">
            <button onclick="run()">START / NEXT</button>
            <button onclick="listenAgain()">AGAIN</button>
            <button onclick="stopAll()">STOP</button>
            <button onclick="showAnswers()">ANSWERS</button>
            <br>
            <button onclick="goBack()" style="background:#c0392b;">RETURN</button>
        </div>
    </div>

    <script>
        (function() {
            const pw = prompt("교수님 전용 비밀번호를 입력하세요:");
            if (pw !== "1234") { alert("접근 권한이 없습니다."); window.location.href = "index.html"; }
        })();

        const canvas = document.getElementById('rta-canvas');
        const rtaCtx = canvas.getContext('2d');
        let bars = new Array(30).fill(0);
        function drawRTA() {
            canvas.width = 600; canvas.height = 300;
            rtaCtx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<bars.length; i++) {
                let targetH = Math.random() * 200 + 30;
                bars[i] += (targetH - bars[i]) * 0.08;
                rtaCtx.fillStyle = '#3498db';
                rtaCtx.fillRect(i * 20, canvas.height - bars[i], 15, bars[i]);
            }
            setTimeout(() => { requestAnimationFrame(drawRTA); }, 40); 
        } drawRTA();

        const ctx = new AudioContext();
        const master = ctx.createGain(); master.gain.value = 0.2; master.connect(ctx.destination);
        const bands = [31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];
        let type, mode = 1, currentRange = 'all', set = [], timer, filter, source, currentQ = 0;

        function init(t) { type = t; document.getElementById('overlay').style.display = 'none'; document.getElementById('main-ui').style.display = 'block'; document.getElementById('ui-title').innerText = t === 'free' ? "Free Practice" : "5-Question Set"; ctx.resume(); }
        function setMode(m) { mode = m; document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('m' + m).classList.add('active'); }
        function setRange(r, btn) { currentRange = r; document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        function goBack() { stopAll(); document.getElementById('overlay').style.display = 'flex'; document.getElementById('main-ui').style.display = 'none'; }

        function getActiveBands() {
            if(currentRange === 'low') return [31.5, 63, 125, 250, 500];
            if(currentRange === 'mid') return [250, 500, 1000, 2000, 4000];
            if(currentRange === 'high') return [1000, 2000, 4000, 8000, 16000];
            return bands;
        }

        function createSource(f, g) {
            if(filter) filter.disconnect();
            filter = ctx.createBiquadFilter(); filter.type = "peaking";
            filter.frequency.value = f; filter.gain.value = g; filter.Q.value = 1.4;
            const b = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
            const data = b.getChannelData(0);
            for(let i=0; i<data.length; i++) data[i] = Math.random()*2-1;
            const s = ctx.createBufferSource(); s.buffer = b; s.loop = true;
            s.connect(filter).connect(master); return s;
        }

        function playPattern(g, callback) {
            filter.gain.value = 0; document.getElementById('status').innerText = "FLAT (3s)";
            timer = setTimeout(() => {
                filter.gain.value = g; document.getElementById('status').innerText = "CHANGE (3s)";
                timer = setTimeout(() => {
                    filter.gain.value = 0; document.getElementById('status').innerText = "FLAT (3s)";
                    timer = setTimeout(() => {
                        filter.gain.value = g; document.getElementById('status').innerText = "CHANGE (3s)";
                        timer = setTimeout(() => { 
                            filter.gain.value = 0; document.getElementById('status').innerText = "FINISHED";
                            if (type === 'free') stopAll();
                            if(callback) callback();
                        }, 3000);
                    }, 3000);
                }, 3000);
            }, 3000);
        }

        function run() {
            stopAll();
            document.getElementById('answer-display').innerHTML = ""; 
            let activeBands = getActiveBands();
            if(type === 'free') {
                let f = activeBands[Math.floor(Math.random()*activeBands.length)];
                let g = (mode==1)?6:(mode==2)?-6:(Math.random()>0.5?6:-6);
                set = [{freq: f, gain: g}];
                source = createSource(f, g); source.start(); playPattern(g);
            } else {
                set = [...activeBands].sort(()=>Math.random()-0.5).slice(0,5).map(f=>({freq:f, gain:(mode==1)?6:(mode==2)?-6:(Math.random()>0.5?6:-6)}));
                playSet(0);
            }
        }

        function playSet(i) {
            if(i >= 5) { document.getElementById('status').innerText = "SET COMPLETE"; return; }
            currentQ = i;
            source = createSource(set[i].freq, set[i].gain); source.start();
            playPattern(set[i].gain, () => { 
                try { source.stop(); } catch(e){}
                document.getElementById('status').innerText = "SILENCE (2s)";
                timer = setTimeout(() => playSet(i+1), 2000); 
            });
        }

        function listenAgain() {
            stopAll();
            let q = (type === 'free') ? set[0] : set[currentQ];
            source = createSource(q.freq, q.gain); source.start();
            playPattern(q.gain);
        }

        function stopAll() { clearTimeout(timer); try { source.stop(); source.disconnect(); } catch(e){} document.getElementById('status').innerText = "STOPPED"; }
        function showAnswers() { document.getElementById('answer-display').innerHTML = set.map((q,i)=>`Q${i+1}: ${q.freq}Hz<br>${q.gain>0?'BOOST':'CUT'}`).join('<br>'); }
    </script>
</body>
</html>
