<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom Trainer</title>
    <style>
        body { margin: 0; height: 100vh; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; background: #1a1a1a; overflow: hidden; }
        
        #auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#1a1a1a; z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #pw-input { padding: 15px; font-size: 1.2em; border-radius: 8px; border: none; margin-bottom: 10px; width: 250px; text-align: center; }
        
        #settings-trigger { position: fixed; top: 20px; right: 20px; font-size: 2em; cursor: pointer; z-index: 200; background: #1a1a1a; padding: 10px; border-radius: 50%; }
        
        #settings-menu { 
            position: fixed; top: 0; right: -400px; width: 350px; height: 100%; 
            background: #1a1a1a; border-left: 1px solid #333; z-index: 150; transition: 0.4s ease-in-out; padding: 40px 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
        #settings-menu.open { right: 0; }
        
        .settings-group { width: 100%; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        .settings-label { margin-bottom: 15px; font-size: 0.9em; color: #7f8c8d; text-align: center; }
        
        /* 버튼 가로 배열 및 중앙 정렬 */
        .btn-row { display: flex; align-items: center; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .separator { color: #555; margin: 0 5px; font-weight: 200; }
        .settings-btn { padding: 8px 12px; font-size: 0.85em; cursor: pointer; border-radius: 4px; border: none; background: #333; color: white; transition: 0.2s; min-width: 60px; }
        .settings-btn.active { background: #3498db !important; }
        
        #close-btn, #return-btn { background: none; border: none; color: white; cursor: pointer; font-size: 0.9em; border-bottom: 1px solid white; padding: 2px 0; margin-top: 20px; }
        
        .overlay-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#1a1a1a; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        
        #display-area { position: relative; width: 600px; height: 300px; margin: 20px auto; background: #000; border: 4px solid #3498db; border-radius: 40px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 0 20px rgba(52, 152, 219, 0.3); }
        #rta-canvas { width: 100%; height: 100%; }
        #answer-display { position: absolute; width: 85%; height: 85%; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 2.2em; line-height: 1.4; font-weight: 900; color: #ffeb3b; background: rgba(0,0,0,0.9); border-radius: 30px; z-index: 10; padding: 10px; box-sizing: border-box; text-align: center; }
        .action-row { display: flex; flex-direction: column; align-items: center; }
        .action-btns { display: flex; gap: 10px; }
        .action-row button { padding: 12px 20px; font-size: 0.9em; cursor: pointer; border-radius: 8px; border: none; margin: 4px; background: #444; color: white; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h2>AUTHENTICATION</h2>
        <input type="password" id="pw-input" placeholder="Password">
        <button onclick="checkPassword()" style="padding: 10px 30px;">ENTER</button>
    </div>

    <div id="settings-trigger" onclick="toggleSettings()">⚙️</div>
    
    <div id="settings-menu">
        <div class="settings-group">
            <div class="settings-label">MODE</div>
            <div class="btn-row">
                <button id="m1" class="settings-btn active" onclick="setMode(1)">BOOST</button>
                <span class="separator">|</span>
                <button id="m2" class="settings-btn" onclick="setMode(2)">CUT</button>
                <span class="separator">|</span>
                <button id="m3" class="settings-btn" onclick="setMode(3)">MIXED</button>
            </div>
        </div>
        <div class="settings-group">
            <div class="settings-label">FREQUENCY RANGE</div>
            <div class="btn-row">
                <button class="settings-btn range-btn active" onclick="setRange('all', this)">ALL</button>
                <span class="separator">|</span>
                <button class="settings-btn range-btn" onclick="setRange('low', this)">LOW</button>
                <span class="separator">|</span>
                <button class="settings-btn range-btn" onclick="setRange('mid', this)">MID</button>
                <span class="separator">|</span>
                <button class="settings-btn range-btn" onclick="setRange('high', this)">HIGH</button>
            </div>
        </div>
        <button id="close-btn" onclick="toggleSettings()">CLOSE</button>
    </div>

    <div id="overlay" class="overlay-screen" style="display:none;">
        <h1>Classroom Trainer</h1>
        <div class="btn-row">
            <button class="settings-btn" onclick="init('free')" style="padding:15px 25px;">Free Practice</button>
            <span class="separator">|</span>
            <button class="settings-btn" onclick="init('set')" style="padding:15px 25px;">5-Question Set</button>
        </div>
    </div>

    <div id="main-ui">
        <h1 id="ui-title" style="text-align: center;">Training</h1>
        <div id="display-area">
            <canvas id="rta-canvas"></canvas>
            <div id="answer-display" style="display:none;"></div>
        </div>
        <div id="status" style="font-size: 1.2em; font-weight:bold; margin-bottom: 10px; text-align: center;">Ready</div>
        <div class="action-row">
            <div class="action-btns">
                <button onclick="run()">START / NEXT</button>
                <button onclick="listenAgain()">AGAIN</button>
                <button onclick="stopAll()">STOP</button>
                <button onclick="showAnswers()">ANSWERS</button>
            </div>
            <button id="return-btn" onclick="goBack()">RETURN TO START</button>
        </div>
    </div>

    <script>
        function checkPassword() {
            if (document.getElementById('pw-input').value === "1234") {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('overlay').style.display = 'flex';
            } else { alert("Wrong Password"); }
        }
        function toggleSettings() { document.getElementById('settings-menu').classList.toggle('open'); }

        const canvas = document.getElementById('rta-canvas');
        const rtaCtx = canvas.getContext('2d');
        let bars = new Array(30).fill(0);
        function drawRTA() {
            canvas.width = 600; canvas.height = 300;
            rtaCtx.clearRect(0, 0, canvas.width, canvas.height);
            for(let i=0; i<bars.length; i++) {
                let targetH = Math.random() * 150 + 20; // 높이 복구
                bars[i] += (targetH - bars[i]) * 0.05; // 반응 속도 차분하게 조정
                rtaCtx.fillStyle = '#3498db';
                rtaCtx.fillRect(i * 20, canvas.height - bars[i], 15, bars[i]);
            }
            requestAnimationFrame(drawRTA);
        } drawRTA();

        const ctx = new AudioContext();
        const master = ctx.createGain(); master.gain.value = 0.2; master.connect(ctx.destination);
        const bands = [31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];
        let type, mode = 1, currentRange = 'all', set = [], timer, filter, source, currentQ = 0;

        function init(t) { type = t; document.getElementById('overlay').style.display = 'none'; ctx.resume(); }
        function setMode(m) { mode = m; document.querySelectorAll('.settings-btn').forEach(btn => btn.classList.remove('active')); document.getElementById('m' + m).classList.add('active'); }
        function setRange(r, btn) { currentRange = r; document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
        function goBack() { stopAll(); document.getElementById('overlay').style.display = 'flex'; }

        function getActiveBands() {
            if(currentRange === 'low') return [31.5, 63, 125, 250, 500];
            if(currentRange === 'mid') return [250, 500, 1000, 2000, 4000];
            if(currentRange === 'high') return [1000, 2000, 4000, 8000, 16000];
            return bands;
        }

        function createSource(f, g) {
            if(filter) filter.disconnect();
            filter = ctx.createBiquadFilter(); filter.type = "peaking";
            filter.frequency.value = f; filter.gain.value = g; filter.Q.value = 1.4;
            const bufferSize = ctx.sampleRate * 2;
            const b = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = b.getChannelData(0);
            let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                b0 = 0.99886 * b0 + white * 0.0555179;
                b1 = 0.99332 * b1 + white * 0.0750759;
                b2 = 0.96900 * b2 + white * 0.1538520;
                b3 = 0.86650 * b3 + white * 0.3104856;
                b4 = 0.55000 * b4 + white * 0.5329522;
                b5 = -0.7616 * b5 - white * 0.0168980;
                data[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                data[i] *= 0.11;
                b6 = white * 0.115926;
            }
            const s = ctx.createBufferSource(); s.buffer = b; s.loop = true;
            s.connect(filter).connect(master); return s;
        }

        function playPattern(g, callback) {
            filter.gain.value = 0; document.getElementById('status').innerText = "FLAT (3s)";
            timer = setTimeout(() => {
                filter.gain.value = g; document.getElementById('status').innerText = "CHANGE (3s)";
                timer = setTimeout(() => {
                    filter.gain.value = 0; document.getElementById('status').innerText = "FLAT (3s)";
                    timer = setTimeout(() => {
                        filter.gain.value = g; document.getElementById('status').innerText = "CHANGE (3s)";
                        timer = setTimeout(() => { 
                            filter.gain.value = 0; document.getElementById('status').innerText = "FINISHED";
                            if (type === 'free') stopAll();
                            if(callback) callback();
                        }, 3000);
                    }, 3000);
                }, 3000);
            }, 3000);
        }

        function run() {
            stopAll();
            document.getElementById('answer-display').style.display = "none";
            let activeBands = getActiveBands();
            if(type === 'free') {
                let f = activeBands[Math.floor(Math.random()*activeBands.length)];
                let g = (mode==1)?6:(mode==2)?-6:(Math.random()>0.5?6:-6);
                set = [{freq: f, gain: g}];
                source = createSource(f, g); source.start(); playPattern(g);
            } else {
                set = [...activeBands].sort(()=>Math.random()-0.5).slice(0,5).map(f=>({freq:f, gain:(mode==1)?6:(mode==2)?-6:(Math.random()>0.5?6:-6)}));
                playSet(0);
            }
        }

        function playSet(i) {
            if(i >= 5) { document.getElementById('status').innerText = "SET COMPLETE"; return; }
            currentQ = i;
            source = createSource(set[i].freq, set[i].gain); source.start();
            playPattern(set[i].gain, () => { 
                try { source.stop(); } catch(e){}
                document.getElementById('status').innerText = "SILENCE (2s)";
                timer = setTimeout(() => playSet(i+1), 2000); 
            });
        }

        function listenAgain() {
            stopAll();
            let q = (type === 'free') ? set[0] : set[currentQ];
            source = createSource(q.freq, q.gain); source.start();
            playPattern(q.gain);
        }

        function stopAll() { clearTimeout(timer); try { source.stop(); source.disconnect(); } catch(e){} document.getElementById('status').innerText = "STOPPED"; }
        function showAnswers() { 
            let d = document.getElementById('answer-display');
            d.style.display = "flex";
            d.innerHTML = set.map((q,i)=>`Q${i+1}: ${q.freq}Hz (${q.gain>0?'BOOST':'CUT'})`).join('<br>'); 
        }
    </script>
</body>
</html>
