<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom Pink Noise Trainer</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f4f4f9; text-align: center; padding: 40px; }
        .controls { margin: 20px; }
        .mode-group { margin-bottom: 10px; }
        button { padding: 15px 30px; font-size: 1em; cursor: pointer; border-radius: 8px; border: none; margin: 5px; transition: 0.2s; }
        .mode-btn { background: #ddd; }
        .mode-btn.active { background: #3498db; color: white; }
        #answer-display { font-size: 2.5em; font-weight: bold; color: #2c3e50; margin: 20px; }
        #status { font-weight: bold; color: #666; margin: 10px; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>Classroom Pink Noise Trainer</h1>
    
    <div class="mode-group">
        <button class="mode-btn active" id="classMode" onclick="setClassMode('free')">Free Practice</button>
        <button class="mode-btn" id="testMode" onclick="setClassMode('test10')">10-Question Test</button>
    </div>
    <div id="test-info" style="margin-bottom: 20px; font-weight: bold;">Mode: Free Practice</div>

    <div class="controls">
        <button onclick="playNewProblem()" style="background:#27ae60; color:white;">Play (Next)</button>
        <button onclick="playAgain()" style="background:#f39c12; color:white;">Listen Again</button>
        <button onclick="showAnswer()" style="background:#2980b9; color:white;">Show Answer</button>
    </div>

    <div id="status">Press Play to start</div>
    <div id="answer-display">?</div>

    <script>
        const ctx = new AudioContext();
        const masterGain = ctx.createGain(); masterGain.gain.value = 0.2; masterGain.connect(ctx.destination);
        const bands = [31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];
        let targetIdx, source, filter, timer, currentGain, classMode = 'free', testCount = 0;

        function setClassMode(m) {
            classMode = m; testCount = 0;
            document.getElementById('classMode').className = (m === 'free' ? 'mode-btn active' : 'mode-btn');
            document.getElementById('testMode').className = (m === 'test10' ? 'mode-btn active' : 'mode-btn');
            document.getElementById('test-info').innerText = "Mode: " + (m === 'free' ? "Free Practice" : "10-Question Test");
            stopAndReset();
        }

        function createNewSource() {
            if(filter) filter.disconnect();
            filter = ctx.createBiquadFilter(); filter.type = "peaking";
            targetIdx = Math.floor(Math.random() * bands.length);
            filter.frequency.value = bands[targetIdx];
            currentGain = (Math.random() > 0.5 ? 6 : -6);
            filter.gain.value = 0; filter.Q.value = 1.4;
            const b = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
            const data = b.getChannelData(0);
            for(let i=0; i<data.length; i++) data[i] = Math.random()*2-1;
            const s = ctx.createBufferSource(); s.buffer = b; s.loop = true;
            s.connect(filter).connect(masterGain);
            return s;
        }

        function playPattern() {
            clearTimeout(timer); ctx.resume();
            filter.gain.value = 0; document.getElementById('status').innerText = "Flat (3s)";
            timer = setTimeout(() => {
                filter.gain.value = currentGain; document.getElementById('status').innerText = "Target (3s)";
                timer = setTimeout(() => {
                    filter.gain.value = 0; document.getElementById('status').innerText = "Flat (3s)";
                    timer = setTimeout(() => {
                        filter.gain.value = currentGain; document.getElementById('status').innerText = "Target (3s)";
                        timer = setTimeout(() => { 
                            filter.gain.value = 0; document.getElementById('status').innerText = "Stopped."; 
                            try { source.stop(); } catch(e){}
                        }, 3000);
                    }, 3000);
                }, 3000);
            }, 3000);
        }

        function playNewProblem() {
            if(classMode === 'test10' && testCount >= 10) { alert("Test Finished!"); return; }
            if(classMode === 'test10') testCount++;
            if(source) try { source.stop(); } catch(e){}
            source = createNewSource(); source.start();
            document.getElementById('answer-display').innerText = "?";
            playPattern();
        }

        function playAgain() { try { source.stop(); } catch(e){} source = createNewSource(); source.start(); playPattern(); }
        function showAnswer() { document.getElementById('answer-display').innerText = bands[targetIdx] + "Hz (" + (currentGain > 0 ? "Boost" : "Cut") + ")"; }
        function stopAndReset() { try { source.stop(); } catch(e){} document.getElementById('status').innerText = "Ready."; }
    </script>
</body>
</html>
