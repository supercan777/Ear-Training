<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Ear Training</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #f4f4f9; color: #333; text-align: center; padding: 20px; margin: 0; }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        canvas { width: 100%; max-width: 600px; height: 120px; background: #fff; border: 1px solid #ddd; margin: 15px auto; border-radius: 8px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stage-btn { padding: 15px; font-size: 14px; border: none; border-radius: 10px; background: #ddd; cursor: pointer; }
        .stage-btn.active { background: #3498db; color: #fff; }
        .eq-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; }
        .band-btn { padding: 20px; font-size: 16px; border: 1px solid #ccc; border-radius: 12px; background: #fff; cursor: pointer; }
        .band-btn.selected { background: #27ae60; color: #fff; border-color: #27ae60; }
        #start-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#f4f4f9; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>음향 청음 훈련</h1>
        <button onclick="initApp()" style="padding:25px 50px; font-size:1.5em; background:#27ae60; color:white; border:none; border-radius:15px; cursor:pointer;">훈련 시작</button>
    </div>

    <h1>Ear Trainer</h1>
    <canvas id="visualizer"></canvas>
    <div id="status" style="font-size: 1.1em; font-weight: bold; margin: 15px;">단계와 난이도를 선택하고 시작하세요.</div>
    
    <div class="btn-group">
        <button class="stage-btn" id="s1" onclick="setStage(1)">1단계(부스트)</button>
        <button class="stage-btn" id="s2" onclick="setStage(2)">2단계(컷)</button>
        <button class="stage-btn" id="s3" onclick="setStage(3)">3단계(혼합)</button>
    </div>

    <div class="eq-grid" id="eq-controls"></div>
    <button onclick="checkAnswer()" style="width:100%; padding:20px; font-size:1.2em; background:#2c3e50; color:white; border:none; border-radius:12px; cursor:pointer;">정답 제출</button>

    <script>
        const ctx = new AudioContext();
        const bands = [31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];
        let filters = [], targetIdx = -1, lastIdx = -1, selectedIdx = -1;
        let stage = 1, questionCount = 0, initialized = false, timer = null;
        const MAX_QUESTIONS = 20;
        let stats = { wins: 0, losses: 0 };

        const analyser = ctx.createAnalyser();
        analyser.fftSize = 1024;
        const source = ctx.createBufferSource();
        source.buffer = (() => {
            const b = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
            const data = b.getChannelData(0);
            let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
            for(let i=0; i<data.length; i++) {
                let w = Math.random()*2-1;
                b0 = 0.99886*b0 + w*0.0555179; b1 = 0.99332*b1 + w*0.0750759;
                b2 = 0.96900*b2 + w*0.1538520; b3 = 0.86650*b3 + w*0.3104856;
                b4 = 0.55000*b4 + w*0.5329522; b5 = -0.7616*b5 - w*0.0168980;
                data[i] = b0+b1+b2+b3+b4+b5+b6 + w*0.5362; b6 = w*0.115926;
            }
            return b;
        })();
        source.loop = true;

        const masterGain = ctx.createGain(); masterGain.gain.value = 0.25;
        let prev = source;
        bands.forEach(f => {
            const filt = ctx.createBiquadFilter();
            filt.type = "peaking"; filt.frequency.value = f; filt.Q.value = 1.4;
            prev.connect(filt); prev = filt; filters.push(filt);
        });
        prev.connect(masterGain); masterGain.connect(analyser); analyser.connect(ctx.destination);
        source.start();

        const container = document.getElementById('eq-controls');
        bands.forEach((freq, i) => {
            const btn = document.createElement('button');
            btn.className = 'band-btn';
            btn.innerText = freq + "Hz";
            btn.onclick = () => {
                document.querySelectorAll('.band-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedIdx = i;
            };
            container.appendChild(btn);
        });

        function initApp() { ctx.resume(); document.getElementById('start-screen').style.display = 'none'; initialized = true; startQuiz(); }

        function setStage(s) { stage = s; questionCount = 0; stats = { wins: 0, losses: 0 }; document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active')); document.getElementById('s'+s).classList.add('active'); startQuiz(); }

        function startQuiz() {
            clearTimeout(timer);
            if (questionCount >= MAX_QUESTIONS) { alert(`훈련 종료! 결과: ${stats.wins}승 ${stats.losses}패`); questionCount = 0; }
            filters.forEach(f => f.gain.value = 0);
            document.getElementById('status').innerText = "기준음 (Flat, 3초)";
            timer = setTimeout(() => {
                let newIdx = Math.floor(Math.random() * bands.length);
                while (newIdx === lastIdx) newIdx = Math.floor(Math.random() * bands.length);
                targetIdx = newIdx; lastIdx = targetIdx;
                filters[targetIdx].gain.value = (stage === 1) ? 6 : ((stage === 2) ? -6 : (Math.random() > 0.5 ? 6 : -6));
                document.getElementById('status').innerText = "변화된 소리 (3초)";
                timer = setTimeout(() => {
                    filters.forEach(f => f.gain.value = 0);
                    document.getElementById('status').innerText = "기준음 재청취 (3초)";
                    timer = setTimeout(() => {
                        filters[targetIdx].gain.value = (stage === 1) ? 6 : ((stage === 2) ? -6 : (Math.random() > 0.5 ? 6 : -6));
                        document.getElementById('status').innerText = `최종 확인 (문제 ${++questionCount}/${MAX_QUESTIONS})`;
                    }, 3000);
                }, 3000);
            }, 3000);
        }

        function checkAnswer() {
            if(selectedIdx === -1) { alert("주파수를 선택하세요!"); return; }
            if(selectedIdx === targetIdx) stats.wins++; else stats.losses++;
            document.querySelectorAll('.band-btn').forEach(b => b.classList.remove('selected'));
            selectedIdx = -1; startQuiz();
        }

        function draw() {
            requestAnimationFrame(draw);
            const array = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(array);
            const canvasCtx = document.getElementById('visualizer').getContext('2d');
            canvasCtx.fillStyle = '#fff'; canvasCtx.fillRect(0, 0, 600, 120);
            canvasCtx.fillStyle = '#3498db';
            array.forEach((val, i) => canvasCtx.fillRect(i * 3, 120 - val/2, 2, val/2));
        }
        draw();
    </script>
</body>
</html>
