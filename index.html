<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Professional Ear Training v3</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; text-align: center; }
        canvas { width: 100%; max-width: 800px; height: 150px; background: #000; margin: 10px auto; display: block; }
        .controls { display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; margin: 20px; }
        .band { display: flex; flex-direction: column; align-items: center; }
        input[type=range] { appearance: slider-vertical; height: 150px; }
    </style>
</head>
<body>
    <h1>청음 훈련 (10-Band ISO)</h1>
    <canvas id="visualizer"></canvas>
    <div id="status" style="font-size: 1.2em; margin: 10px;">시작하려면 화면을 클릭하세요.</div>
    <div class="controls" id="eq-controls"></div>
    <div style="margin:20px;">
        <button onclick="setDifficulty(6)">6dB</button>
        <button onclick="setDifficulty(3)">3dB</button>
        <button onclick="setDifficulty(1.5)">1.5dB</button>
        <button onclick="resetStats()" style="background: #a00;">기록 초기화</button>
    </div>
    <button onclick="checkAnswer()" style="padding:15px 30px; font-size:1.2em; background:#0a0; color:white; border:none; cursor:pointer;">정답 제출 및 다음 문제</button>

    <script>
        const ctx = new AudioContext();
        const bands = [31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];
        let filters = [], targetIdx = -1, lastIdx = -1, difficulty = 6;
        let stats = JSON.parse(localStorage.getItem('earTrainStats')) || { wins: 0, losses: 0 };

        const analyser = ctx.createAnalyser();
        analyser.fftSize = 1024;
        
        const source = ctx.createBufferSource();
        source.buffer = (() => {
            const b = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
            const data = b.getChannelData(0);
            let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
            for(let i=0; i<data.length; i++) {
                let w = Math.random()*2-1;
                b0 = 0.99886*b0 + w*0.0555179; b1 = 0.99332*b1 + w*0.0750759;
                b2 = 0.96900*b2 + w*0.1538520; b3 = 0.86650*b3 + w*0.3104856;
                b4 = 0.55000*b4 + w*0.5329522; b5 = -0.7616*b5 - w*0.0168980;
                data[i] = b0+b1+b2+b3+b4+b5+b6 + w*0.5362; b6 = w*0.115926;
            }
            return b;
        })();
        source.loop = true;

        // 마스터 게인 추가 (디스토션 방지)
        const masterGain = ctx.createGain();
        masterGain.gain.value = 0.25; 

        let prev = source;
        bands.forEach(f => {
            const filt = ctx.createBiquadFilter();
            filt.type = "peaking"; filt.frequency.value = f; filt.Q.value = 1.4;
            prev.connect(filt); prev = filt; filters.push(filt);
        });
        prev.connect(masterGain); 
        masterGain.connect(analyser); analyser.connect(ctx.destination);
        source.start();

        const container = document.getElementById('eq-controls');
        filters.forEach((f, i) => {
            const div = document.createElement('div');
            div.className = 'band';
            div.innerHTML = `<span>${bands[i]}Hz</span><input type="range" min="-12" max="12" value="0" oninput="filters[${i}].gain.value=this.value">`;
            container.appendChild(div);
        });

        function updateStatus() { document.getElementById('status').innerText = `성적: ${stats.wins}승 ${stats.losses}패 (난이도: ${difficulty}dB)`; }

        function setDifficulty(db) { difficulty = db; updateStatus(); startQuiz(); }

        function startQuiz() {
            ctx.resume();
            filters.forEach(f => f.gain.value = 0);
            let newIdx = Math.floor(Math.random() * 10);
            while (newIdx === lastIdx) newIdx = Math.floor(Math.random() * 10);
            targetIdx = newIdx;
            lastIdx = targetIdx;
            filters[targetIdx].gain.value = difficulty;
            document.querySelectorAll('input').forEach((input, i) => input.value = 0);
        }

        function checkAnswer() {
            let maxGain = -99, userIdx = -1;
            filters.forEach((f, i) => { if(f.gain.value > maxGain) { maxGain = f.gain.value; userIdx = i; } });
            if(userIdx === targetIdx) { stats.wins++; alert("정답!"); } 
            else { stats.losses++; alert("오답! 정답: " + bands[targetIdx] + "Hz"); }
            localStorage.setItem('earTrainStats', JSON.stringify(stats));
            updateStatus();
            startQuiz();
        }

        function resetStats() { stats = {wins: 0, losses: 0}; localStorage.removeItem('earTrainStats'); updateStatus(); }

        updateStatus();
        
        const canvas = document.getElementById('visualizer');
        const canvasCtx = canvas.getContext('2d');
        function draw() {
            requestAnimationFrame(draw);
            const array = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(array);
            canvasCtx.fillStyle = '#000'; canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            canvasCtx.fillStyle = '#0f0';
            array.forEach((val, i) => canvasCtx.fillRect(i * 2, canvas.height - val/2, 1, val/2));
        }
        draw();
    </script>
</body>
</html>
