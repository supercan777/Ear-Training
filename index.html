<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Professional Ear Training v5</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; text-align: center; }
        .controls { display: flex; justify-content: center; gap: 10px; margin: 20px; flex-wrap: wrap; }
        .band-btn { padding: 15px; cursor: pointer; border: 1px solid #444; background: #333; color: white; border-radius: 5px; }
        .band-btn.selected { background: #0a0; }
        .stage-btn { padding: 10px 20px; cursor: pointer; background: #555; color: white; border: none; border-radius: 5px; }
        .stage-btn.active { background: #007bff; }
        #start-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#1a1a1a; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
    </style>
</head>
<body>
    <!-- 시작 화면 -->
    <div id="start-screen">
        <h1>청음 훈련 앱</h1>
        <button onclick="initApp()" style="padding:30px 60px; font-size:2em; cursor:pointer; background:#0a0; color:white; border:none; border-radius:10px;">훈련 시작하기</button>
    </div>

    <h1>청음 훈련 (10-Band ISO)</h1>
    <div id="status" style="font-size: 1.2em; margin: 10px;">난이도를 선택하고 시작하세요.</div>
    
    <div class="controls">
        <button class="stage-btn" id="s1" onclick="setStage(1)">1단계: 부스트만</button>
        <button class="stage-btn" id="s2" onclick="setStage(2)">2단계: 컷만</button>
        <button class="stage-btn" id="s3" onclick="setStage(3)">3단계: 혼합</button>
    </div>

    <div class="controls" id="eq-controls"></div>
    <button onclick="checkAnswer()" style="padding:20px 40px; font-size:1.5em; background:#0a0; color:white; border:none; cursor:pointer;">정답 제출</button>

    <script>
        const ctx = new AudioContext();
        let initialized = false;
        
        // [중요] 오디오 초기화 함수
        function initApp() {
            if(initialized) return;
            ctx.resume();
            document.getElementById('start-screen').style.display = 'none';
            initialized = true;
            startQuiz();
        }

        // [이후 코드는 이전과 동일]
        const bands = [31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];
        let filters = [], targetIdx = -1, lastIdx = -1, selectedIdx = -1;
        let stage = 1, questionCount = 0;
        const MAX_QUESTIONS = 20;
        let stats = { wins: 0, losses: 0 };

        // 핑크 노이즈 엔진 및 UI 생성 코드 등... (이전 코드 그대로 사용)
        // ... (나머지 동일한 코드를 여기에 유지하세요) ...
        
        // 시작 시 초기값 설정
        document.getElementById('s1').classList.add('active');
    </script>
</body>
</html>
