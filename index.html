<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Professional Ear Training v4</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; text-align: center; }
        .controls { display: flex; justify-content: center; gap: 10px; margin: 20px; flex-wrap: wrap; }
        .band-btn { padding: 15px; cursor: pointer; border: 1px solid #444; background: #333; color: white; border-radius: 5px; }
        .band-btn.selected { background: #0a0; }
        .stage-btn { padding: 10px 20px; cursor: pointer; background: #555; color: white; border: none; border-radius: 5px; }
        .stage-btn.active { background: #007bff; }
    </style>
</head>
<body>
    <h1>청음 훈련 (10-Band ISO)</h1>
    <div id="status" style="font-size: 1.2em; margin: 10px;">단계와 난이도를 선택하고 시작하세요.</div>
    
    <div class="controls">
        <button class="stage-btn" id="s1" onclick="setStage(1)">1단계: 부스트만</button>
        <button class="stage-btn" id="s2" onclick="setStage(2)">2단계: 컷만</button>
        <button class="stage-btn" id="s3" onclick="setStage(3)">3단계: 혼합</button>
    </div>

    <div class="controls" id="eq-controls"></div>
    <button onclick="checkAnswer()" style="padding:20px 40px; font-size:1.5em; background:#0a0; color:white; border:none; cursor:pointer;">정답 제출</button>

    <script>
        const ctx = new AudioContext();
        const bands = [31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];
        let filters = [], targetIdx = -1, lastIdx = -1, selectedIdx = -1;
        let stage = 1, questionCount = 0;
        const MAX_QUESTIONS = 20;
        let stats = { wins: 0, losses: 0 };

        // [오디오/필터 설정 코드는 이전과 동일]
        const source = ctx.createBufferSource();
        // ... (핑크 노이즈 생성 코드는 기존 index.html과 동일하게 유지) ...
        const masterGain = ctx.createGain(); masterGain.gain.value = 0.25;
        let prev = source;
        bands.forEach(f => {
            const filt = ctx.createBiquadFilter();
            filt.type = "peaking"; filt.frequency.value = f; filt.Q.value = 1.4;
            prev.connect(filt); prev = filt; filters.push(filt);
        });
        prev.connect(masterGain); masterGain.connect(ctx.destination);
        source.start();

        // UI 생성
        const container = document.getElementById('eq-controls');
        bands.forEach((freq, i) => {
            const btn = document.createElement('button');
            btn.className = 'band-btn';
            btn.innerText = freq + "Hz";
            btn.onclick = () => {
                document.querySelectorAll('.band-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedIdx = i;
            };
            container.appendChild(btn);
        });

        function setStage(s) {
            stage = s;
            questionCount = 0;
            stats = { wins: 0, losses: 0 };
            document.querySelectorAll('.stage-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('s'+s).classList.add('active');
            startQuiz();
        }

        function startQuiz() {
            if (questionCount >= MAX_QUESTIONS) {
                alert(`훈련 종료! 최종 점수: ${stats.wins}승 ${stats.losses}패`);
                questionCount = 0; return;
            }
            ctx.resume();
            filters.forEach(f => f.gain.value = 0);
            
            let newIdx = Math.floor(Math.random() * bands.length);
            while (newIdx === lastIdx) newIdx = Math.floor(Math.random() * bands.length);
            targetIdx = newIdx; lastIdx = targetIdx;
            
            if (stage === 1) filters[targetIdx].gain.value = 6;
            else if (stage === 2) filters[targetIdx].gain.value = -6;
            else filters[targetIdx].gain.value = Math.random() > 0.5 ? 6 : -6;
            
            questionCount++;
            document.getElementById('status').innerText = `${stage}단계 연습 중 | 문제: ${questionCount}/${MAX_QUESTIONS}`;
        }

        function checkAnswer() {
            if(selectedIdx === -1) return;
            if(selectedIdx === targetIdx) stats.wins++; else stats.losses++;
            
            document.querySelectorAll('.band-btn').forEach(b => b.classList.remove('selected'));
            selectedIdx = -1;
            startQuiz();
        }

        setStage(1); // 초기값 설정
    </script>
</body>
</html>
