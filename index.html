<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Classroom Trainer - Student Edition</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #3498db;
            --danger-color: #e74c3c;
            --success-color: #2ecc71;
            --text-color: #ffffff;
        }

        body { 
            margin: 0; 
            min-height: 100vh; 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; 
            display: flex; 
            justify-content: center; 
            background: var(--bg-color); 
            color: var(--text-color); 
            overscroll-behavior-y: none;
        }
        
        #app-container {
            width: 100%;
            max-width: 500px; 
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: auto;
            background: var(--bg-color);
            box-sizing: border-box;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: var(--surface-color);
            border-bottom: 1px solid #333;
        }
        
        .header h1 { margin: 0; font-size: 1.2em; }
        #settings-trigger { font-size: 1.5em; cursor: pointer; }

        .btn {
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: #333;
            color: white;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        .btn:active { transform: scale(0.97); }
        .btn.active { background: var(--primary-color); }
        .btn.primary { background: var(--primary-color); }

        .full-overlay { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: var(--bg-color); z-index:100; 
            display:flex; flex-direction:column; align-items:center; justify-content:center; 
            padding: 20px; box-sizing: border-box;
        }
        
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }

        .content-area { padding: 20px; display: flex; flex-direction: column; align-items: center; flex: 1; }
        
        #display-area { 
            position: relative; width: 100%; aspect-ratio: 2 / 1; 
            background: #000; border: 3px solid var(--primary-color); 
            border-radius: 20px; overflow: hidden; margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2);
        }
        #rta-canvas { width: 100%; height: 100%; display: block; }
        
        #answer-display {
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 10; 
            text-align: center; font-size: 1.5em; font-weight: bold; padding: 10px;
            box-sizing: border-box; line-height: 1.4;
        }

        #status { font-size: 0.95em; font-weight: 600; text-align: center; margin-bottom: 20px; min-height: 24px; color: #aaa;}

        .action-btns { display: flex; gap: 10px; width: 100%; margin-bottom: 15px; }

        .freq-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }
        .freq-grid .btn { 
            padding: 20px 2px;
            font-size: 0.95em; 
            border-radius: 12px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #settings-menu { 
            position: absolute; top: 0; right: -100%; width: 85%; height: 100%; 
            background: var(--surface-color); z-index: 150; transition: right 0.3s ease; 
            padding: 20px; box-shadow: -5px 0 20px rgba(0,0,0,0.5); 
            overflow-y: auto; box-sizing: border-box;
        }
        #settings-menu.open { right: 0; }
        
        .settings-group { margin-bottom: 25px; width: 100%; }
        .settings-label { margin-bottom: 10px; font-size: 0.8em; color: #aaa; font-weight: bold; text-align: left; }
        .row { display: flex; gap: 8px; flex-wrap: wrap; }
        
        #url-input { 
            padding: 15px; border-radius: 10px; border: none; font-size: 1em; 
            background: #2a2a2a; color: white; width: 100%; box-sizing: border-box; margin-bottom: 15px; text-align: center;
        }
    </style>
</head>
<body>

<div id="app-container">
    
    <div id="welcome-overlay" class="full-overlay" style="z-index: 999;">
        <h2 style="margin-bottom: 10px;">Classroom Trainer</h2>
        <p style="margin-bottom: 40px; color: #aaa;">Student Edition</p>
        <button class="btn primary" onclick="startApp()" style="width: 250px;">START</button>
    </div>

    <div class="header">
        <h1 id="header-title">Ear Training</h1>
        <div id="settings-trigger" onclick="toggleSettings()">⚙️</div>
    </div>

    <div id="overlay" class="full-overlay">
        <h2 style="margin-bottom: 40px; color: var(--primary-color);">Select Mode</h2>
        <div class="menu-grid">
            <button class="btn" onclick="init('listen')">🎧 LISTEN (Free Mode)</button>
            <button class="btn" onclick="init('practice')">🎯 PRACTICE (Quiz Mode)</button>
            <button class="btn" onclick="init('test', 2)">📝 TEST (2 Questions)</button>
            <button class="btn" onclick="init('test', 5)">📝 TEST (5 Questions)</button>
        </div>
    </div>

    <div class="content-area">
        <div id="display-area">
            <canvas id="rta-canvas" width="600" height="300"></canvas>
            <div id="answer-display"></div>
        </div>
        
        <div id="status">Ready</div>
        
        <div id="action-btns" class="action-btns"></div>

        <div id="freq-controls" class="freq-grid" style="display:none;"></div>
        
        <button class="btn" onclick="goBack()" style="background: transparent; border: 1px solid #555; margin-top: auto;">← RETURN TO MAIN MENU</button>
    </div>

    <div id="settings-menu">
        <h2 style="margin-top: 0; color: var(--primary-color);">SETTINGS</h2>
        
        <div class="settings-group">
            <div class="settings-label">AUDIO SOURCE</div>
            <div class="row">
                <button id="btn-src-pn" class="btn active" style="flex:1; padding:10px;" onclick="setSource('pn')">PN</button>
                <button id="btn-src-file" class="btn" style="flex:1; padding:10px;" onclick="setSource('file')">FILE</button>
                <button id="btn-src-track" class="btn" style="flex:1; padding:10px;" onclick="setSource('track')">TRACKS</button>
                <button id="btn-src-url" class="btn" style="flex:1; padding:10px;" onclick="setSource('url')">URL</button>
                <input type="file" id="file-input" style="display:none;" accept="audio/*" onchange="handleFileUpload(event)">
            </div>
            
            <div id="track-input-group" style="display:none; margin-top:15px; width:100%;">
                <div class="settings-label" style="text-align: center; margin-bottom: 10px;">Select Track (Dropbox)</div>
                <div class="row" style="justify-content:center;">
                    <button class="btn primary" style="flex:1; padding:10px;" onclick="loadTrack('1')">1</button>
                    <button class="btn primary" style="flex:1; padding:10px;" onclick="loadTrack('2')">2</button>
                    <button class="btn primary" style="flex:1; padding:10px;" onclick="loadTrack('3')">3</button>
                    <button class="btn primary" style="flex:1; padding:10px;" onclick="loadTrack('4')">4</button>
                    <button class="btn primary" style="flex:1; padding:10px;" onclick="loadTrack('5')">5</button>
                </div>
            </div>

            <div id="url-input-group" style="display:none; margin-top:15px; flex-direction:column;">
                <input type="text" id="url-input" placeholder="Enter Direct WAV/MP3 Link">
                <button class="btn" onclick="loadFromUrl()" style="background:#27ae60;">LOAD AUDIO</button>
            </div>
            
            <div id="file-name" style="font-size:0.8em; color:var(--primary-color); margin-top:15px; text-align:center; word-break: break-all;">Pink Noise</div>
        </div>
        
        <div class="settings-group" id="file-time-group" style="display:none;">
            <div class="settings-label">FILE START TIME</div>
            <div class="row" style="align-items: center;">
                <button class="btn" onclick="adjustFileTime(-10)">-10s</button>
                <div id="file-time-display" style="flex:1; text-align:center; font-weight:bold; color:var(--primary-color);">0s</div>
                <button class="btn" onclick="adjustFileTime(10)">+10s</button>
            </div>
        </div>

        <div class="settings-group">
            <div class="settings-label">GAIN AMOUNT (Difficulty)</div>
            <div class="row">
                <button class="btn gain-btn" onclick="setGainAmount(6, this)" style="flex:1;">6 dB</button>
                <button class="btn gain-btn active" onclick="setGainAmount(12, this)" style="flex:1;">12 dB</button>
            </div>
        </div>

        <div class="settings-group">
            <div class="settings-label">EQ MODE</div>
            <div class="row">
                <button class="btn eq-btn active" onclick="setEqMode('boost', this)" style="flex:1;">BOOST</button>
                <button class="btn eq-btn" onclick="setEqMode('cut', this)" style="flex:1;">CUT</button>
            </div>
        </div>

        <button class="btn" onclick="toggleSettings()" style="margin-top: 20px; background: transparent; border: 1px solid white;">CLOSE</button>
    </div>

</div>

<script>
    let audioCtx;
    let masterGain;
    let activeSource = null;
    let biquadFilter = null;
    let customBuffer = null;
    
    let currentMode = '';
    let totalTestQuestions = 5; 
    let isPracticeActive = false;
    
    let currentEqMode = 'boost';
    let currentGainAmount = 12; 
    let targetGain = 12;        

    let currentPracticeFreq = null;
    let sequenceTimer = null;
    const bands = [31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];

    let currentListenFreq = null; 
    let isPlaying = false; 

    let testAnswers = [];
    let currentTestQuestion = 0;
    let isTestCompleted = false;

    let fileStartTime = 0;
    let waveformCanvas = document.createElement('canvas');
    waveformCanvas.width = 600;
    waveformCanvas.height = 300;

    function startApp() {
        document.getElementById('welcome-overlay').style.display = 'none';
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            updateGainSettings(); 
            masterGain.connect(audioCtx.destination);
        }
    }
    
    function toggleSettings() { document.getElementById('settings-menu').classList.toggle('open'); }
    
    function goBack() { 
        stopAudio();
        document.getElementById('overlay').style.display='flex'; 
        document.getElementById('header-title').innerText = "Ear Training";
    }

    function updateGainSettings() {
        targetGain = currentEqMode === 'boost' ? currentGainAmount : -currentGainAmount;
        if (masterGain) {
            masterGain.gain.value = currentEqMode === 'boost' && currentGainAmount === 12 ? 0.15 : 0.3;
        }
        if (currentMode === 'listen' && currentListenFreq && biquadFilter) {
            biquadFilter.gain.value = targetGain;
        }
    }

    function setEqMode(mode, btn) {
        currentEqMode = mode;
        document.querySelectorAll('.eq-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateGainSettings();
    }

    function setGainAmount(amount, btn) {
        currentGainAmount = amount;
        document.querySelectorAll('.gain-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateGainSettings();
    }

    function setSource(type) {
        document.querySelectorAll('#btn-src-pn, #btn-src-file, #btn-src-url, #btn-src-track').forEach(b => b.classList.remove('active'));
        document.getElementById('url-input-group').style.display = 'none';
        document.getElementById('track-input-group').style.display = 'none';
        
        if(type === 'pn') {
            document.getElementById('btn-src-pn').classList.add('active');
            customBuffer = null;
            document.getElementById('file-name').innerText = "Pink Noise";
            document.getElementById('file-time-group').style.display = 'none'; 
        } else if (type === 'file') {
            document.getElementById('btn-src-file').classList.add('active');
            document.getElementById('file-input').click();
            document.getElementById('file-time-group').style.display = 'flex'; 
        } else if (type === 'url') {
            document.getElementById('btn-src-url').classList.add('active');
            document.getElementById('url-input-group').style.display = 'flex';
            document.getElementById('file-time-group').style.display = 'flex'; 
        } else if (type === 'track') {
            document.getElementById('btn-src-track').classList.add('active');
            document.getElementById('track-input-group').style.display = 'block';
            document.getElementById('file-time-group').style.display = 'flex'; 
        }
    }

    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) { setSource('pn'); return; }
        document.getElementById('file-name').innerText = file.name;
        const reader = new FileReader();
        reader.onload = function(e) {
            audioCtx.decodeAudioData(e.target.result, function(buffer) {
                customBuffer = buffer;
                fileStartTime = 0; 
                document.getElementById('file-time-display').innerText = fileStartTime + "s";
                renderWaveform();
            });
        };
        reader.readAsArrayBuffer(file);
    }

    // ★ 여기에 교수님의 드롭박스 '직접 링크(dl.dropboxusercontent.com...)' 5개를 각각 넣어주세요!
    const dropboxLinks = {
        '1': 'https://dl.dropboxusercontent.com/scl/fi/0rnmd0n7zzkypct0ebzdp/1.wav?rlkey=tamnml28i0uzsobtmdjbht9nr](https://dl.dropboxusercontent.com/scl/fi/0rnmd0n7zzkypct0ebzdp/1.wav?rlkey=tamnml28i0uzsobtmdjbht9nr',
        '2': 'https://dl.dropboxusercontent.com/scl/fi/lrnn9foz3d9qqwqwqzl3t/2.wav?rlkey=nnwd2zwizqwc44my6pbfnd200&dl=0,
        '3': 'https://dl.dropboxusercontent.com/scl/fi/vll9k3op29f9shap7gr1o/3.wav?rlkey=ysxd4eaya8yxebszm0c4vkykz&dl=0',
        '4': 'https://dl.dropboxusercontent.com/scl/fi/9nmp6zny41o6dca4fivau/4.wav?rlkey=7x6t5nniryqct7awiykc3k4ki&dl=0',
        '5': 'https://dl.dropboxusercontent.com/scl/fi/v99h1hy85pq2urz12sza7/5.wav?rlkey=t9a658f7id0r6d6eizjyrwybk&st=w9yeq8br&dl=0'
    };

    async function loadTrack(trackNum) {
        const url = dropboxLinks[trackNum];
        document.getElementById('file-name').innerText = `Loading Track ${trackNum}...`;
        
        try {
            const response = await fetch(url);
            if(!response.ok) throw new Error("File not found");
            const arrayBuffer = await response.arrayBuffer();
            customBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            fileStartTime = 0; 
            document.getElementById('file-time-display').innerText = "0s";
            document.getElementById('file-name').innerText = `Loaded: Track ${trackNum} (WAV)`;
            renderWaveform();
        } catch (error) {
            alert(`Track ${trackNum} 로드에 실패했습니다.\n코드 내의 드롭박스 링크(dl.dropboxusercontent.com)가 올바른지 확인해주세요.`);
            document.getElementById('file-name').innerText = "Load Failed";
            setSource('pn');
        }
    }

    async function loadFromUrl() {
        const url = document.getElementById('url-input').value;
        if(!url) return alert("Please enter a URL.");
        document.getElementById('file-name').innerText = "Loading...";
        try {
            const response = await fetch(url);
            const arrayBuffer = await response.arrayBuffer();
            customBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            fileStartTime = 0; 
            document.getElementById('file-time-display').innerText = "0s";
            document.getElementById('file-name').innerText = "Loaded: " + url.split('/').pop().substring(0, 20) + "...";
            renderWaveform();
        } catch (error) {
            alert("Audio load failed. Please check the link and CORS policy.");
            setSource('pn');
        }
    }

    function adjustFileTime(sec) {
        fileStartTime += sec;
        if (fileStartTime < 0) fileStartTime = 0;
        if (customBuffer && fileStartTime >= customBuffer.duration) fileStartTime = Math.floor(customBuffer.duration) - 5;
        document.getElementById('file-time-display').innerText = fileStartTime + "s";
    }

    function init(mode, testQs = 5) {
        currentMode = mode;
        totalTestQuestions = testQs;
        isPracticeActive = false;
        
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('header-title').innerText = mode.toUpperCase() + (mode === 'test' ? ` (${testQs} Qs)` : '');
        document.getElementById('answer-display').style.display = 'none'; 
        document.getElementById('status').innerText = "Ready";
        
        const controls = document.getElementById('freq-controls');
        const actions = document.getElementById('action-btns');
        controls.innerHTML = ''; actions.innerHTML = '';
        
        bands.forEach(f => {
            controls.innerHTML += `<button id="btn-freq-${f}" class="btn freq-item" onclick="handleFreqClick(${f})">${f}</button>`;
        });

        if(mode === 'listen') {
            controls.style.display = 'grid';
            actions.innerHTML = '<button class="btn primary" onclick="playListenAudio()">PLAY</button><button class="btn" onclick="stopAudio()" style="background:#e74c3c;">STOP</button>';
            currentListenFreq = null; 
            if (biquadFilter) biquadFilter.gain.value = 0;
        } else if(mode === 'practice') {
            controls.style.display = 'grid'; 
            actions.innerHTML = '<button class="btn primary" onclick="runPractice()">START QUIZ</button>';
        } else if(mode === 'test') {
            controls.style.display = 'none';
            actions.innerHTML = '<button class="btn primary" onclick="runTest()">START EXAM</button><button class="btn" onclick="listenAgain()">AGAIN</button><button class="btn" onclick="stopAudio()" style="background:#e74c3c;">STOP</button><button class="btn" onclick="showAnswers()">ANSWERS</button>';
        }
    }

    function handleFreqClick(freq) {
        if (currentMode === 'listen') {
            const allBtns = document.querySelectorAll('.freq-item');
            allBtns.forEach(btn => btn.classList.remove('active'));

            if (currentListenFreq === freq) {
                currentListenFreq = null;
                if (biquadFilter) biquadFilter.gain.value = 0; 
                document.getElementById('status').innerText = isPlaying ? "PLAYING: FLAT (Original)" : "READY";
            } else {
                currentListenFreq = freq;
                document.getElementById(`btn-freq-${freq}`).classList.add('active'); 
                if(!biquadFilter) createOrUpdateFilter(freq, targetGain);
                else { biquadFilter.frequency.value = freq; biquadFilter.gain.value = targetGain; }
                document.getElementById('status').innerText = isPlaying ? `PLAYING: ${freq}Hz (${targetGain > 0 ? '+' : ''}${Math.abs(targetGain)}dB)` : `READY (Pending: ${freq}Hz)`;
            }
        } else if (currentMode === 'practice') {
            if (!isPracticeActive) {
                alert("Please press 'START QUIZ' first.");
                return;
            }
            
            stopAudio(); 
            isPracticeActive = false;
            
            const display = document.getElementById('answer-display');
            if (freq === currentPracticeFreq) {
                display.innerHTML = `<span style="color:var(--success-color)">Correct!</span><br>${currentPracticeFreq} Hz`;
            } else {
                display.innerHTML = `<span style="color:var(--danger-color)">Incorrect!</span><br>Answer: ${currentPracticeFreq} Hz<br><span style="font-size:0.6em; color:#ccc;">(Your choice: ${freq} Hz)</span>`;
            }
            display.style.display = 'flex';
            
            document.getElementById('status').innerText = "Quiz Completed.";
            document.getElementById('action-btns').innerHTML = '<button class="btn primary" onclick="runPractice()">NEXT QUESTION</button><button class="btn" onclick="listenPracticeAgain()">LISTEN AGAIN</button>';
        }
    }

    function createOrUpdateFilter(freq, gain) {
        if (!biquadFilter) {
            biquadFilter = audioCtx.createBiquadFilter();
            biquadFilter.type = "peaking";
            biquadFilter.Q.value = 1.4;
        }
        biquadFilter.frequency.value = freq;
        biquadFilter.gain.value = gain;
    }

    function playListenAudio() {
        if (isPlaying) return; 
        if (!biquadFilter) createOrUpdateFilter(1000, 0); 
        startAudioSource();
        if (currentListenFreq) document.getElementById('status').innerText = `PLAYING: ${currentListenFreq}Hz (${targetGain > 0 ? '+' : ''}${Math.abs(targetGain)}dB)`;
        else document.getElementById('status').innerText = "PLAYING: FLAT (Original)";
    }

    function cancelPractice() {
        stopAudio();
        isPracticeActive = false;
        document.getElementById('answer-display').style.display = 'none';
        document.getElementById('status').innerText = "Canceled. Ready to start.";
        document.getElementById('action-btns').innerHTML = '<button class="btn primary" onclick="runPractice()">START QUIZ</button>';
    }

    function runPractice() {
        currentPracticeFreq = bands[Math.floor(Math.random() * bands.length)];
        
        if (customBuffer) {
            const maxStart = Math.max(0, customBuffer.duration - 32);
            fileStartTime = Math.random() * maxStart;
            document.getElementById('file-time-display').innerText = Math.floor(fileStartTime) + "s";
        }
        
        isPracticeActive = true;
        document.getElementById('answer-display').style.display = 'none';
        
        document.getElementById('action-btns').innerHTML = '<button class="btn" onclick="cancelPractice()" style="background:#e74c3c;">STOP (Cancel)</button>';
        
        playPracticeSequence(currentPracticeFreq);
    }
    
    function listenPracticeAgain() {
        isPracticeActive = true;
        document.getElementById('answer-display').style.display = 'none';
        document.getElementById('action-btns').innerHTML = '<button class="btn" onclick="cancelPractice()" style="background:#e74c3c;">STOP (Cancel)</button>';
        playPracticeSequence(currentPracticeFreq);
    }

    function playPracticeSequence(freq) {
        stopAudio();
        document.getElementById('answer-display').style.display = 'none'; 
        
        biquadFilter = audioCtx.createBiquadFilter();
        biquadFilter.type = "peaking";
        biquadFilter.frequency.value = freq;
        biquadFilter.Q.value = 1.4;
        biquadFilter.gain.value = 0; 
        startAudioSource();
        
        document.getElementById('status').innerText = "Listen carefully... (Select answer anytime!)";

        function step1() { biquadFilter.gain.value = 0; sequenceTimer = setTimeout(step2, 3000); } 
        function step2() { biquadFilter.gain.value = targetGain; sequenceTimer = setTimeout(step3, 3000); } 
        function step3() { biquadFilter.gain.value = 0; sequenceTimer = setTimeout(step4, 3000); } 
        function step4() { biquadFilter.gain.value = targetGain; sequenceTimer = setTimeout(step5, 3000); } 
        function step5() { biquadFilter.gain.value = 0; sequenceTimer = setTimeout(finishPracticeSeq, 2000); } 
        
        step1(); 
    }
    
    function finishPracticeSeq() {
        stopAudio();
        document.getElementById('status').innerText = "Audio finished. Select your answer!";
        document.getElementById('action-btns').innerHTML = '<button class="btn primary" onclick="listenPracticeAgain()">LISTEN AGAIN</button><button class="btn" onclick="cancelPractice()" style="background:#e74c3c;">STOP</button>';
    }

    function runTest() {
        testAnswers = [];
        for (let i = 0; i < totalTestQuestions; i++) {
            testAnswers.push(bands[Math.floor(Math.random() * bands.length)]);
        }

        if (customBuffer) {
            const maxStart = Math.max(0, customBuffer.duration - 75);
            fileStartTime = Math.random() * maxStart;
            document.getElementById('file-time-display').innerText = Math.floor(fileStartTime) + "s";
        }

        isTestCompleted = false;
        currentTestQuestion = 0;
        startTestSequence(0);
    }

    function listenAgain() {
        if (currentMode === 'test') {
            if (testAnswers.length > 0) {
                let target = currentTestQuestion - 1;
                if (target < 0) target = 0; 
                startTestSequence(target);
            }
            else alert("Please press START EXAM first.");
        }
    }

    function showAnswers() {
        const display = document.getElementById('answer-display');
        if (currentMode === 'test') {
            if (testAnswers.length > 0) {
                display.innerHTML = '<div style="font-size:0.6em; color:#ccc; margin-bottom:15px;">[ TEST ANSWERS ]</div>' + 
                                    testAnswers.map((ans, i) => `Q${i+1}: <span style="color:var(--primary-color)">${ans} Hz</span>`).join('<br>');
                display.style.display = 'flex'; 
            }
        }
    }

    function startTestSequence(questionIndex) {
        stopAudio();
        document.getElementById('answer-display').style.display = 'none'; 
        isTestCompleted = false;
        currentTestQuestion = questionIndex;
        
        biquadFilter = audioCtx.createBiquadFilter();
        biquadFilter.type = "peaking";
        biquadFilter.Q.value = 1.4;
        biquadFilter.gain.value = 0; 
        startAudioSource();

        nextTestStep();
    }

    function nextTestStep() {
        if (currentTestQuestion >= totalTestQuestions) {
            biquadFilter.gain.value = 0; 
            document.getElementById('status').innerText = "All questions completed! Playing original source... (3s)";
            
            sequenceTimer = setTimeout(() => {
                stopAudio();
                isTestCompleted = true;
                document.getElementById('status').innerText = "TEST COMPLETED! Check your ANSWERS.";
            }, 3000);
            return;
        }

        biquadFilter.gain.value = 0; 
        document.getElementById('status').innerText = `[Question ${currentTestQuestion + 1}/${totalTestQuestions}] Playing original... (5s)`;
        
        sequenceTimer = setTimeout(() => {
            biquadFilter.frequency.value = testAnswers[currentTestQuestion];
            biquadFilter.gain.value = targetGain;
            document.getElementById('status').innerText = `[Question ${currentTestQuestion + 1}/${totalTestQuestions}] First change applied! (3s)`;

            sequenceTimer = setTimeout(() => {
                biquadFilter.gain.value = 0;
                document.getElementById('status').innerText = `[Question ${currentTestQuestion + 1}/${totalTestQuestions}] Playing original... (3s)`;

                sequenceTimer = setTimeout(() => {
                    biquadFilter.gain.value = targetGain;
                    document.getElementById('status').innerText = `[Question ${currentTestQuestion + 1}/${totalTestQuestions}] Second change applied! (3s)`;

                    sequenceTimer = setTimeout(() => {
                        currentTestQuestion++;
                        nextTestStep(); 
                    }, 3000); 
                }, 3000); 
            }, 3000); 
        }, 5000); 
    }
    
    function startAudioSource() {
        activeSource = audioCtx.createBufferSource();
        
        if (customBuffer) {
            activeSource.buffer = customBuffer;
        } else {
            const bufferSize = audioCtx.sampleRate * 10;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                b0 = 0.99886 * b0 + white * 0.0555179;
                b1 = 0.99332 * b1 + white * 0.0750759;
                b2 = 0.96900 * b2 + white * 0.1538520;
                b3 = 0.86650 * b3 + white * 0.3104856;
                b4 = 0.55000 * b4 + white * 0.5329522;
                b5 = -0.7616 * b5 - white * 0.0168980;
                output[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
                b6 = white * 0.115926;
            }
            activeSource.buffer = noiseBuffer;
        }
        
        activeSource.loop = true;
        activeSource.connect(biquadFilter);
        biquadFilter.connect(masterGain);
        
        let offset = customBuffer ? fileStartTime : 0;
        activeSource.start(0, offset);
        isPlaying = true;
    }

    function stopAudio() {
        clearTimeout(sequenceTimer);
        if (activeSource) {
            try { activeSource.stop(); activeSource.disconnect(); } catch(e) {}
            activeSource = null;
        }
        isPlaying = false;
        document.getElementById('status').innerText = "STOPPED";
        
        if (currentMode === 'listen') {
            document.querySelectorAll('.freq-item').forEach(b => b.classList.remove('active'));
            currentListenFreq = null;
        }
    }

    function renderWaveform() {
        const ctx = waveformCanvas.getContext('2d');
        ctx.clearRect(0,0,600,300);
        if(!customBuffer) return;
        const data = customBuffer.getChannelData(0);
        const step = Math.ceil(data.length / 600);
        ctx.fillStyle = '#3498db'; 
        for (let i = 0; i < 600; i++) {
            let min = 1.0, max = -1.0;
            for (let j = 0; j < step; j++) {
                let datum = data[i * step + j];
                if (datum < min) min = datum;
                if (datum > max) max = datum;
            }
            let y = (1 + min) * 150;
            let h = Math.max(1, (max - min) * 150);
            ctx.fillRect(i, y, 1, h);
        }
    }

    function drawRTA() {
        const canvas = document.getElementById('rta-canvas'); 
        const ctx = canvas.getContext('2d'); 
        ctx.clearRect(0,0,600,300);

        if (customBuffer) {
            ctx.drawImage(waveformCanvas, 0, 0, 600, 300);
            const startX = (fileStartTime / customBuffer.duration) * 600;
            ctx.fillStyle = '#ffeb3b';
            ctx.fillRect(startX, 0, 3, 300);
        } else {
            for(let i=0; i<30; i++) { 
                let h = Math.random()*150+20; 
                ctx.fillStyle='#3498db'; 
                ctx.fillRect(i*20, 300-h, 15, h); 
            }
        }
        setTimeout(() => requestAnimationFrame(drawRTA), 150);
    } 
    drawRTA();
</script>
