<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom Trainer - Student</title>
    <style>
        body { margin: 0; min-height: 100vh; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; background: #1a1a1a; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .overlay-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#1a1a1a; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #main-ui { display: flex; flex-direction: column; align-items: center; width: 100%; }
        #display-area { position: relative; width: 600px; height: 300px; margin: 20px auto; background: #000; border: 4px solid #3498db; border-radius: 40px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 0 20px rgba(52, 152, 219, 0.3); }
        #rta-canvas { width: 100%; height: 100%; }
        .btn-row { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .settings-btn { padding: 15px 30px; font-size: 1.1em; cursor: pointer; border-radius: 8px; border: none; background: #333; color: white; transition: 0.2s; }
        .freq-btn { padding: 12px 15px; font-size: 0.9em; min-width: 80px; background: #444; }
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .action-btns button { padding: 12px 20px; cursor: pointer; border-radius: 8px; border: none; background: #444; color: white; }
    </style>
</head>
<body>

    <div id="overlay" class="overlay-screen">
        <h1>Classroom Trainer</h1>
        <div class="btn-row">
            <button class="settings-btn" onclick="init('practice')">PRACTICE</button>
            <button class="settings-btn" onclick="init('test')">TEST</button>
        </div>
    </div>

    <div id="main-ui" style="display:none;">
        <h1 id="ui-title">Training</h1>
        <div id="display-area">
            <canvas id="rta-canvas"></canvas>
            <div id="answer-display" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); color:#ffeb3b; font-size:2em; font-weight:bold; flex-direction:column; align-items:center; justify-content:center; z-index:10; text-align:center;"></div>
        </div>
        <div id="freq-controls" class="btn-row"></div>
        <div id="status" style="font-size: 1.2em; font-weight:bold; margin-top:20px;">Ready</div>
        <div id="action-btns" class="action-btns"></div>
        <button id="return-btn" onclick="location.reload()" style="background:none; border:none; color:white; border-bottom:1px solid white; margin-top:20px; cursor:pointer;">RETURN TO MENU</button>
    </div>

    <script>
        let audioCtx, masterGain, activeSource, biquadFilter, sequenceTimer;
        let currentMode = '', currentFreq = null, testAnswers = [], currentTestQuestion = 0;
        const bands = [31.5, 63, 125, 250, 500, 1000, 2000, 4000, 8000, 16000];

        function init(mode) {
            currentMode = mode;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('ui-title').innerText = mode.toUpperCase();
            
            const controls = document.getElementById('freq-controls');
            controls.innerHTML = '';
            bands.forEach(f => {
                controls.innerHTML += `<button class="settings-btn freq-btn" onclick="checkAnswer(${f})">${f}Hz</button>`;
            });
            document.getElementById('action-btns').innerHTML = '<button onclick="startTraining()">START</button><button onclick="listenAgain()">AGAIN</button><button onclick="stopAudio()">STOP</button>';
        }

        // 오디오 엔진과 핑크 노이즈 생성을 통합
        function startTraining() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.value = 0.3;
                masterGain.connect(audioCtx.destination);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            currentMode === 'practice' ? runPractice() : runTest();
        }

        function generatePinkNoise() {
            const bufferSize = audioCtx.sampleRate * 10;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            let b = [0,0,0,0,0,0,0];
            for (let i = 0; i < bufferSize; i++) {
                let w = Math.random() * 2 - 1;
                b[0]=0.99886*b[0]+w*0.0555179; b[1]=0.99332*b[1]+w*0.0750759;
                b[2]=0.96900*b[2]+w*0.1538520; b[3]=0.86650*b[3]+w*0.3104856;
                b[4]=0.55000*b[4]+w*0.5329522; b[5]=-0.7616*b[5]-w*0.0168980;
                output[i]=(b[0]+b[1]+b[2]+b[3]+b[4]+b[5]+b[6]+w*0.5362)*0.11;
                b[6]=w*0.115926;
            }
            return buffer;
        }

        function checkAnswer(freq) {
            const display = document.getElementById('answer-display');
            if (currentMode === 'practice') {
                display.innerText = (freq === currentFreq) ? "CORRECT!" : "WRONG! (" + currentFreq + "Hz)";
                display.style.display = 'flex';
                setTimeout(() => { display.style.display = 'none'; }, 2000);
            }
        }

        function runPractice() {
            currentFreq = bands[Math.floor(Math.random() * bands.length)];
            playSequence(currentFreq);
        }

        function runTest() {
            testAnswers = [];
            for (let i = 0; i < 5; i++) testAnswers.push(bands[Math.floor(Math.random() * bands.length)]);
            currentTestQuestion = 0;
            startTestSequence(0);
        }

        function listenAgain() {
            if (currentMode === 'practice' && currentFreq) playSequence(currentFreq);
            else if (currentMode === 'test') startTestSequence(Math.max(0, currentTestQuestion - 1));
        }

        function playSequence(freq) {
            stopAudio();
            biquadFilter = audioCtx.createBiquadFilter();
            biquadFilter.type = "peaking";
            biquadFilter.frequency.value = freq;
            biquadFilter.Q.value = 1.4;
            activeSource = audioCtx.createBufferSource();
            activeSource.buffer = generatePinkNoise();
            activeSource.loop = true;
            activeSource.connect(biquadFilter).connect(masterGain);
            activeSource.start();
            document.getElementById('status').innerText = "PLAYING...";
            
            let seq = [0, 6, 0, 6, 0, 6, 0, 6, 0];
            let timing = [5000, 3000, 3000, 3000, 3000, 3000, 3000, 3000, 5000];
            let i = 0;
            function next() {
                if(i >= seq.length) { stopAudio(); return; }
                biquadFilter.gain.value = seq[i];
                sequenceTimer = setTimeout(() => { i++; next(); }, timing[i]);
            }
            next();
        }

        function startTestSequence(idx) {
            stopAudio();
            currentTestQuestion = idx;
            biquadFilter = audioCtx.createBiquadFilter();
            biquadFilter.type = "peaking";
            biquadFilter.Q.value = 1.4;
            activeSource = audioCtx.createBufferSource();
            activeSource.buffer = generatePinkNoise();
            activeSource.loop = true;
            activeSource.connect(biquadFilter).connect(masterGain);
            activeSource.start();
            nextTestStep();
        }

        function nextTestStep() {
            if (currentTestQuestion >= 5) { stopAudio(); document.getElementById('status').innerText = "TEST END"; return; }
            biquadFilter.gain.value = 0;
            document.getElementById('status').innerText = `[문제 ${currentTestQuestion + 1}/5] 원본 재생 중...`;
            sequenceTimer = setTimeout(() => {
                biquadFilter.frequency.value = testAnswers[currentTestQuestion];
                biquadFilter.gain.value = 6;
                setTimeout(() => { biquadFilter.gain.value = 0; 
                    setTimeout(() => { biquadFilter.gain.value = 6; 
                        setTimeout(() => { currentTestQuestion++; nextTestStep(); }, 3000);
                    }, 3000);
                }, 3000);
            }, 5000);
        }

        function stopAudio() {
            clearTimeout(sequenceTimer);
            if (activeSource) { activeSource.stop(); activeSource.disconnect(); }
            activeSource = null; document.getElementById('status').innerText = "STOPPED";
        }

        function drawRTA() {
            const canvas = document.getElementById('rta-canvas'), ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,600,300);
            for(let i=0; i<30; i++) { ctx.fillStyle='#3498db'; ctx.fillRect(i*20, 300-(Math.random()*150+20), 15, Math.random()*150+20); }
            setTimeout(() => requestAnimationFrame(drawRTA), 100);
        } drawRTA();
    </script>
</body>
</html>
